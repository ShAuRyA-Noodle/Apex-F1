## 3. The Backend Data Layer — Talking to 15 APIs

This site has no database of its own. Every number you see (Verstappen's points, the live gap to the leader, the latest news headline) is borrowed in real time from somebody else's server. This section teaches you exactly how that borrowing works, from the absolute basics up to the clever tricks that keep the site fast, cheap, and crash proof. Everything here lives in `/Users/shauryapunj/Desktop/F1_Shaurya/packages/api-client/src/`.

### 3.1 What even is an API?

An **API** (Application Programming Interface) is a way for one program to ask another program for data. You do not get to read the other company's database directly. Instead they put up a counter, and you place an order at that counter.

> 🧠 Analogy: An API is a restaurant waiter. You (the website) do not walk into the kitchen and cook. You tell the waiter "I'd like the 2024 driver standings," the waiter walks to the kitchen (their database), and brings back a plate (the data). You never see the kitchen. You only know the menu (the list of things you're allowed to order) and you get a plate back.

In this repo the "waiters" are 15 different external services. A few you'll meet in this section:

- **Jolpica** (`jolpica/client.ts`): historical F1 facts. Standings, schedules, every driver since 1950, race results. This is the Ergast archive, reborn.
- **OpenF1** (`openf1/index.ts`): live and recent session telemetry. Car GPS positions, lap times, tyre stints, weather, race-control flags.
- **RSS feeds + news APIs** (`rss/index.ts`, `currents/client.ts`, plus Guardian, GNews, NewsData, NewsAPI): the news rail. Headlines from many publishers.
- **The aggregator** (`aggregator.ts`): the conductor that calls many news sources at once and merges them into one clean stream.

The **menu** for an API is its list of **endpoints**. An endpoint is just a URL you can request. For Jolpica the base address is set once at the top of the file:

`packages/api-client/src/jolpica/client.ts`
```ts
const BASE = 'https://api.jolpi.ca/ergast/f1';
```

Every order you place gets glued onto the end of that base. Ask for `2024/driverStandings.json` and the full URL becomes `https://api.jolpi.ca/ergast/f1/2024/driverStandings.json`. That string IS the order ticket.

### 3.2 HTTP requests: how the order is placed

When your code talks to a waiter, it does so over **HTTP** (HyperText Transfer Protocol), the same protocol your browser uses to load any web page. An HTTP request has a few parts: the **URL** (where), the **method** (GET = "give me data", POST = "here is some data to save"), and **headers** (little notes attached to the order, like "I prefer JSON, please").

Here is the actual request being sent in the OpenF1 client:

`packages/api-client/src/openf1/index.ts`
```ts
const res = await fetch(url.toString(), {
  headers: { Accept: 'application/json' },
  next: opts.revalidate !== undefined ? { revalidate: opts.revalidate } : undefined,
} as RequestInit);
```

`fetch(...)` is the built-in JavaScript function that actually sends the HTTP request over the network. `headers: { Accept: 'application/json' }` is the note "send me JSON, not HTML." The thing you get back, stored in `res`, is a **Response** object. It carries a **status code** (a number telling you how the order went) and the actual data.

The status code matters enormously and the code reacts to it directly:

`packages/api-client/src/openf1/index.ts`
```ts
if (!res.ok) {
  console.warn(`[openf1] ${res.status} ${res.statusText} ${url.toString()}`);
  return ([] as unknown) as T;
}
return (await res.json()) as T;
```

`res.ok` is `true` for any status in the 200s (success). The big ones you must memorize:

- **200** = OK, here's your plate.
- **404** = Not Found (you ordered something off-menu, e.g. a driver slug that doesn't exist).
- **429** = Too Many Requests (you've ordered too much, the kitchen is cutting you off). This one drives a LOT of the design in this repo.
- **500 / 502 / 503** = the kitchen is on fire (server error, usually temporary).

> 🧠 Analogy: The status code is the waiter's face when they come back. Smiling (200) means food. "We're out of that" (404). "Sir, you've ordered 40 times in one minute, please slow down" (429). "The kitchen flooded, give us a sec" (500).

### 3.3 JSON: the language the plate is written in

The data comes back as **JSON** (JavaScript Object Notation), a plain-text format for structured data that looks like JavaScript objects: curly braces, keys, values, arrays in square brackets. It's the universal exchange format of the web because it's human-readable and every language can parse it.

`await res.json()` is the line that converts the raw text the waiter handed you into a real JavaScript object you can poke at. So when Jolpica returns something shaped like `{ "MRData": { "StandingsTable": { ... } } }`, after `.json()` you can write `env.MRData.StandingsTable` in code and it just works.

> 🧠 Analogy: JSON is the receipt printed in a language both the kitchen and you agreed to read. `res.json()` is you putting on your reading glasses to actually parse it.

Not every API speaks JSON though. The RSS news feeds speak **XML** (a tag-based format, older, used for syndication). That's why the RSS client has an extra step that JSON clients don't:

`packages/api-client/src/rss/index.ts`
```ts
import { XMLParser } from 'fast-xml-parser';
...
const xml = await res.text();
return parseRss(xml, source.name);
```

Notice it calls `res.text()` (raw text) instead of `res.json()`, then runs that text through an XML parser. Same idea (turn text into a usable object) but a different decoder ring because the format is different.

### 3.4 async / await and Promises: waiting without freezing

Talking to a server over the internet is slow (tens to hundreds of milliseconds). Your program cannot just stop and stare at the wall while it waits, it would freeze. JavaScript solves this with **Promises** and the **async / await** keywords.

A **Promise** is an IOU. When you call `fetch()`, you don't get the data immediately, you get a Promise: "I promise to give you a Response later." An **async** function is one allowed to contain `await`. **await** means "pause HERE, let other work happen, and resume this line once the Promise resolves."

> 🧠 Analogy: A Promise is a pager at a busy restaurant. You order, they hand you a buzzer (the Promise), and you go sit down (your program does other things). `await` is you choosing to wait for THIS buzzer before doing the next step. The kitchen isn't blocked; you're not frozen standing at the counter.

You see this everywhere. Look at one Jolpica method:

`packages/api-client/src/jolpica/client.ts`
```ts
async getDriverStandings(season: number | 'current' = 'current', opts: FetchOpts = {}) {
  const env = await get<JolpicaDriverStandingsEnvelope>(`${season}/driverStandings.json`, {
    revalidate: 300,
    ...opts,
  });
  return env.MRData.StandingsTable.StandingsLists[0]?.DriverStandings ?? [];
},
```

`async` marks the function. `await get(...)` pauses until the fetch finishes, then continues. Because `get` itself is async and uses `await fetch(...)` inside, you have a clean chain: the page awaits the method, the method awaits `get`, `get` awaits `fetch`. No freezing, no callback spaghetti.

### 3.5 Promise.all: ordering from many waiters at once

Here is the single most important performance idea in the whole data layer. If you need news from five providers, you could ask them one at a time: ask RSS, wait, ask Guardian, wait, ask GNews, wait. If each takes 300ms, that's 1.5 seconds of waiting in a line. Terrible.

Instead you fire all five orders simultaneously and wait for the slowest one. That's **`Promise.all`**: give it an array of Promises, it runs them in parallel, and resolves when every one is done.

`packages/api-client/src/rss/index.ts`
```ts
const [rssResults, guardianResults, newsApiResults, newsDataResults, currentsResults] = await Promise.all([
  rssPromise,
  guardianPromise,
  newsApiPromise,
  newsDataPromise,
  currentsPromise,
]);
```

All five providers are hit at the same time. Total wait = the slowest single provider, not the sum. The `const [a, b, c] = ...` syntax is **array destructuring**: `Promise.all` returns results in the SAME order you passed the promises, so position 0 is always RSS, position 1 is always Guardian, and so on.

> 🧠 Analogy: Promise.all is sending five waiters to five kitchens at once instead of making one waiter do five round trips. Dinner arrives when the slowest kitchen plates up, not after a relay race.

The aggregator does the exact same thing for its five sources:

`packages/api-client/src/aggregator.ts`
```ts
const [rssItems, guardianItems, gnewsItems, newsDataItems, newsApiItems] = await Promise.all([
  enabled.rss
    ? getRssNewsFeed({ revalidate }).catch(() => [] as RssItem[])
    : Promise.resolve([] as RssItem[]),
  ...
```

Note the `? : Promise.resolve([])` pattern. If a provider is disabled, instead of calling it, the code slots in an instantly-resolved empty Promise so the array still has the right number of slots and the destructuring lines up. That's a small but important detail: Promise.all needs every position filled.

### 3.6 The CORE RULE: graceful degradation (return `[]` / `null`, never crash)

This is the philosophy that defines this entire codebase, and it's the thing to emphasize hardest in an interview. The rule, written into the comments themselves, is **CORE RULE #1: every provider returns an empty result on failure, never throws.**

Why does this matter so much? This is a Next.js site that **prerenders pages at build time**. If one API call throws an unhandled error during the build, the WHOLE page build fails and you ship a broken site. With 15 external APIs, something is always having a bad day. So instead of letting a failure explode upward, every client catches it and returns "nothing" (`[]` for lists, `null` for single items).

> 🧠 Analogy: Imagine a restaurant where if ONE ingredient is missing, the chef burns the whole building down. Insane. Graceful degradation says: out of basil? Serve the pasta without basil. The customer gets a slightly plainer dish instead of no dinner and a fire. A missing news source means a slightly shorter rail, not a dead page.

The simplest, cleanest example of the rule is the Currents client, which is the template all the others follow:

`packages/api-client/src/currents/client.ts`
```ts
export async function getCurrentsF1News(
  opts: CurrentsFetchOpts & { revalidate?: number } = {},
): Promise<CurrentsNewsItem[]> {
  const apiKey = process.env['CURRENTS_API_KEY'];
  if (!apiKey) return [];          // no key? quietly return nothing.
  ...
  try {
    const items = await currentsSearch({ ... }).catch(() => [] as CurrentsNewsItem[]);
    items.sort((a, b) => new Date(b.published).getTime() - new Date(a.published).getTime());
    return items;
  } catch {
    return [];                     // any failure? return nothing.
  }
}
```

Three layers of safety in one tiny function: (1) no API key, return `[]`; (2) the inner fetch has its own `.catch(() => [])`; (3) the whole thing is wrapped in `try { } catch { return []; }`. There is no possible path where this function throws. That is the rule made physical.

Notice also the deliberate split: the LOW-level `currentsSearch` DOES throw on a bad response (`throw new Error(...)`), but the PUBLIC `getCurrentsF1News` swallows everything. That's a clean design: the raw function is honest about failure for testing, the public function is bulletproof for production. The comment says it outright: "Returns [] on any failure (CORE RULE #1: no synthetic fallback)."

The phrase **"no synthetic fallback"** is worth memorizing. It means: when an API fails, the site does NOT invent fake data to fill the gap. It would be tempting to show made-up headlines so the rail looks full. This codebase refuses. Real data or nothing. An empty rail is honest; a fake one is a lie that could mislead an F1 fan.

The Jolpica client expresses the same rule with a twist. Because Jolpica returns a deeply nested "envelope" object, returning a bare `[]` wouldn't match the shape callers expect. So it manufactures a fully-empty-but-correctly-shaped envelope:

`packages/api-client/src/jolpica/client.ts`
```ts
function emptyEnvelope<T>(): JolpicaEnvelope<T> {
  return {
    MRData: {
      RaceTable: { Races: [] },
      StandingsTable: { StandingsLists: [] },
      DriverTable: { Drivers: [] },
      ...
    },
  } as unknown as JolpicaEnvelope<T>;
}
```

The comment nails why: "Every public method reads exactly one table and falls back via `?? []` / `?? null`, so an all-empty envelope degrades any caller to an empty result instead of throwing." Look back at `getDriverStandings`: it ends in `?? []`. The **`??`** is the **nullish coalescing operator**: "use the left side, but if it's null or undefined, use the right side instead." That single `?? []` is what turns a missing table into a harmless empty list. The **gotcha**: if you forget the `?? []` on even ONE method, a missing-data day becomes a crash on that one page. The pattern only works if it's applied everywhere, with discipline.

### 3.7 Retries with exponential backoff (handling the temporary "no")

Some failures are permanent (a 404, an unknown driver) and some are temporary (a 429 rate-limit or a 500 server hiccup). For temporary ones, immediately giving up is wasteful, the very next request might succeed. So the Jolpica client RETRIES, but politely, waiting longer each time. This is **exponential backoff**.

`packages/api-client/src/jolpica/client.ts`
```ts
const MAX_RETRIES = 3;
const sleep = (ms: number) => new Promise((r) => setTimeout(r, ms));

async function get<T>(path: string, opts: FetchOpts = {}): Promise<JolpicaEnvelope<T>> {
  ...
  for (let attempt = 0; attempt <= MAX_RETRIES; attempt++) {
    try {
      const res = await fetchImpl(url.toString(), { ... });
      if (res.status === 429 || res.status >= 500) {
        if (attempt < MAX_RETRIES) {
          await sleep(500 * 2 ** attempt + Math.floor(Math.random() * 250));
          continue;
        }
        return emptyEnvelope<T>();
      }
      if (!res.ok) return emptyEnvelope<T>();   // permanent fail: don't retry
      return (await res.json()) as JolpicaEnvelope<T>;
    } catch {
      if (attempt < MAX_RETRIES) {
        await sleep(500 * 2 ** attempt + Math.floor(Math.random() * 250));
        continue;
      }
      return emptyEnvelope<T>();
    }
  }
  return emptyEnvelope<T>();
}
```

Walk through the wait math: `500 * 2 ** attempt`. `2 ** attempt` is "2 to the power of attempt." Attempt 0 waits ~500ms, attempt 1 waits ~1000ms, attempt 2 waits ~2000ms. Each retry backs off twice as long. The extra `+ Math.floor(Math.random() * 250)` adds a random sprinkle called **jitter**.

> 🧠 Analogy: Exponential backoff is knocking on a busy bathroom door. You don't hammer it every half-second. You wait, then wait longer, then longer still. Jitter is so that ten people waiting on the same door don't all knock at the exact same instant and stampede.

Why jitter specifically? Because at build time many page renders hit Jolpica at once. Without jitter, all their retries would line up and fire simultaneously (a "thundering herd"), re-triggering the very 429 they're trying to escape. The random offset spreads the knocks out. Crucially, notice the difference between failure types: a 429/5xx retries, but a plain `!res.ok` (like a 404) returns the empty envelope IMMEDIATELY, no retry. Retrying a 404 would just waste three more requests on something that will never exist. OpenF1's `getLocation` uses the same backoff with `600 * 2 ** attempt`, tuned higher because that endpoint is heavy and slow.

### 3.8 Caching with Next.js revalidate (ISR): speed and cost

If a million people load the homepage, you do NOT want a million calls to Jolpica. That would be slow for users and would blow past every rate limit instantly. The fix is **caching**: fetch once, save the answer, and serve that saved answer to everyone for a while.

Next.js builds this right into `fetch` via the `next: { revalidate: N }` option. This is **ISR** (Incremental Static Regeneration). `revalidate: 300` means "cache this response for 300 seconds; serve the cached copy to everyone; after 5 minutes, the next request triggers a fresh fetch in the background and updates the cache." You saw it in every client:

`packages/api-client/src/openf1/index.ts`
```ts
next: opts.revalidate !== undefined ? { revalidate: opts.revalidate } : undefined,
```

> 🧠 Analogy: revalidate is a chalkboard "special of the day." The chef cooks it once in the morning, writes it on the board, and every customer reads the board (free, instant). Only every few hours does the chef walk back to re-cook and rewrite. A thousand customers, one cooking session.

The genius part is that the revalidate window is tuned PER ENDPOINT to match how fast that data actually changes. Look at the values chosen across the Jolpica client:

`packages/api-client/src/jolpica/client.ts`
```ts
getSchedule          → revalidate: 3600   // schedule barely moves: 1 hour
getDriverStandings   → revalidate: 300    // changes only on race weekends: 5 min
getDriver            → revalidate: 86400  // a driver's bio is static: 24 hours
getAllDrivers        → revalidate: 86400  // the all-time list: 24 hours
```

And OpenF1, which is LIVE telemetry, goes the opposite direction because the data changes every second:

`packages/api-client/src/openf1/index.ts`
```ts
getIntervals  → revalidate: 5    // live gap to leader: 5 seconds
getPositions  → revalidate: 5    // live track positions: 5 seconds
getLaps       → revalidate: 15   // lap times: 15 seconds
getLatestSession → revalidate: 30
```

The principle: **cache as long as you can get away with without showing stale data.** A driver's birthday never changes, so cache it 24 hours. The live gap between cars changes constantly, so cache it only 5 seconds. The **gotcha**: set the window too long on live data and the page shows lies (a frozen race). Set it too short on static data and you waste requests and money for nothing. The numbers in this file are a hand-tuned map of "how fresh does this specific fact need to be."

### 3.9 Rate limits, quotas, and the revalidate FLOOR pattern

Free API tiers come with **quotas**: a hard cap on how many requests you may make per day. Go over and you get cut off (429) or billed. The news providers here have brutal caps. The repo documents them in one place:

`packages/api-client/src/rss/index.ts`
```
NewsAPI  1000s (~72/day, limit 100) · NewsData 600s (~144/day, limit 200)
Currents  600s (~144/day, limit 600) · Guardian 600s (~144/day, limit 500)
```

Here's the problem the **FLOOR pattern** solves. A cron job (an automated timer) pings `/api/cron/rss-sync` every 5 minutes to keep news fresh. 5-minute caching means 12 fetches per hour, 288 per day. But NewsAPI only allows **100 requests per day**. At 288/day you'd be locked out before lunch. The caller WANTS 300-second freshness, but that's suicidal for a 100/day quota.

The solution: each quota'd client refuses to refresh faster than its own safe minimum, no matter what the caller asks. It clamps the caller's request up to a floor using `Math.max`:

`packages/api-client/src/aggregator.ts`
```ts
// NewsAPI: 100/day cap. Client floors revalidate to 1000s.
getNewsAPIF1News({ pageSize: 20, revalidate: Math.max(revalidate, 1000) })
```

`Math.max(revalidate, 1000)` means "use the caller's revalidate, OR 1000 seconds, whichever is LARGER." So even if the caller passes 300, NewsAPI gets clamped to a minimum 1000-second cache.

Now the math that justifies the floor of 1000: a day has 86,400 seconds. `86400 / 1000 ≈ 86` refreshes per day, and in practice the comment estimates ~72/day, comfortably under the 100 limit with headroom. Walk the others:

- **NewsData, 200/day limit → floor 600s.** `86400 / 600 = 144` refreshes/day. Under 200. Safe.
- **Currents, 600/day limit → floor 600s.** 144/day, miles under 600.
- **Guardian, 500/day limit → floor 600s.** 144/day, safe.

> 🧠 Analogy: The floor is a faucet with a built-in minimum drip rate. You can ask it to pour faster, but the valve physically won't let you exceed a safe trickle, so you never flood the basin (blow the quota) before the day is out. The comment puts it perfectly: even when a pinger hits every 5 min, "the actual upstream network calls stay well under quota and last past midnight."

The **gotcha**: the floor only protects you if EVERY call site respects it. If one forgotten route calls NewsAPI with `revalidate: 60`, that one route alone can burn the whole day's 100 requests and 429 everything else. That's why the clamp lives near the client and is documented loudly. The free RSS feeds, by contrast, carry NO floor (`fetchFeed(s, revalidate)` uses the raw 300s) because they have no quota to protect.

### 3.10 Pagination: the 100-per-page cap fix

Some APIs refuse to hand you everything at once. Jolpica caps a single response at **100 rows**. Ask for Lewis Hamilton's career results (he has ~360 races) and you'd get only the OLDEST 100, silently dropping every recent win. Your "career wins" tally would be wrong and you'd never see an error. This is the nastiest kind of bug: a wrong answer that looks correct.

**Pagination** is the fix: ask for 100, then ask again with an `offset` to skip the first 100 and get the next 100, and keep going until you've collected the total. Here's the real implementation:

`packages/api-client/src/jolpica/client.ts`
```ts
async getDriverResults(driverId: string, opts: FetchOpts = {}) {
  // Jolpica caps a page at 100 results. A long career (Hamilton ~360 races)
  // would otherwise return only the oldest 100, dropping every recent win.
  const PAGE = 100;
  const first = await get<JolpicaResultsEnvelope>(`drivers/${driverId}/results.json`, {
    revalidate: 3600, limit: PAGE, offset: 0, ...opts,
  });
  const races = [...first.MRData.RaceTable.Races];
  const total = Number((first.MRData as { total?: string }).total) || races.length;
  for (let offset = PAGE; offset < total && offset < 1200; offset += PAGE) {
    const env = await get<JolpicaResultsEnvelope>(`drivers/${driverId}/results.json`, {
      revalidate: 3600, limit: PAGE, offset, ...opts,
    });
    races.push(...env.MRData.RaceTable.Races);
  }
  return races;
},
```

Step by step: fetch page one (`offset: 0`). The response tells you the grand `total`. Then loop, bumping `offset` by 100 each time (`offset: 100`, then `200`, then `300`...), fetching and appending each page with `races.push(...env...)` (the `...` spread merges the new page's array into the running list). Stop when `offset >= total`.

> 🧠 Analogy: Pagination is reading a long book the library only lets you photocopy 100 pages at a time. You copy pages 1-100, then 101-200, then 201-300, stacking them until you have the whole book. Asking once and assuming you got everything would mean reviewing a novel from only its first chapter.

Two safety details to notice. First, `?` in `?? races.length`: if the API forgets to send `total`, fall back to what you actually received so the loop still terminates. Second, the hard ceiling `offset < 1200`. This caps the loop at ~12 pages even if `total` were absurdly large or malformed. The **gotcha** it prevents: without that ceiling, a bad `total` value could send you into a near-infinite loop hammering the API, burning quota and hanging the build. The same paginated pattern appears in `getAllDrivers` (~880 drivers across F1 history).

### 3.11 The news aggregator: merging and deduping many providers

Now the showpiece. The aggregator's job: call many news sources at once, then fuse their results into ONE clean, ordered, duplicate-free list. The hard problem is **duplicates**. A single wire story (say, "Verstappen wins in Monaco") gets republished by Motorsport, Autosport, and The Guardian. Show all three and your rail looks like spam.

The trick is to compute a **fingerprint** for each article and skip any fingerprint you've already seen. Two fingerprints are used: a normalized title and a normalized URL.

`packages/api-client/src/aggregator.ts`
```ts
function fingerprint(title: string): string {
  return title
    .toLowerCase()
    .replace(/[^a-z0-9 ]+/g, '')   // strip punctuation
    .replace(/\s+/g, ' ')          // collapse whitespace
    .trim();
}

function urlKey(link: string): string {
  try {
    const u = new URL(link);
    for (const p of ['utm_source','utm_medium','utm_campaign','utm_term','utm_content','CMP','ref']) {
      u.searchParams.delete(p);    // strip tracking junk
    }
    return `${u.hostname}${u.pathname}`.toLowerCase();
  } catch {
    return link.toLowerCase();
  }
}
```

Why normalize? Because the same story arrives with tiny cosmetic differences. One publisher's URL has `?utm_source=twitter` glued on; the title has a stray em-dash or different capitalization. Raw string comparison would call them "different." By lowercasing, stripping punctuation, collapsing spaces, and deleting tracking parameters, two superficially-different versions of the same story collapse to an IDENTICAL key.

> 🧠 Analogy: A fingerprint ignores what shirt you're wearing. "VERSTAPPEN Wins! — Monaco" and "verstappen wins monaco" produce the same fingerprint, the way the same person photographs differently but has one set of prints. The dedupe checks prints, not outfits.

The merge then walks every list in priority order and keeps only first-seen fingerprints:

`packages/api-client/src/aggregator.ts`
```ts
function mergeAndDedupe(lists: RssItem[][]): RssItem[] {
  const seenUrls = new Set<string>();
  const seenTitles = new Set<string>();
  const out: RssItem[] = [];
  for (const list of lists) {
    for (const item of list) {
      if (!item.title || !item.link) continue;
      const uk = urlKey(item.link);
      const fp = fingerprint(item.title);
      if (seenUrls.has(uk) || seenTitles.has(fp)) continue;  // already seen → skip
      seenUrls.add(uk);
      seenTitles.add(fp);
      out.push(item);
    }
  }
  out.sort((a, b) => b.pubDateMs - a.pubDateMs);   // newest first
  return out;
}
```

A **`Set`** is a collection that only stores unique values and answers "have I seen this?" in near-instant time. `seenUrls.has(uk)` is the fast lookup. The final `.sort((a, b) => b.pubDateMs - a.pubDateMs)` orders newest-first (subtracting a smaller timestamp from a larger one puts recent items on top).

Now the subtle bit interviewers love: **order is priority**. The comment spells it out: "the first-seen variant wins. We pass RSS first (highest editorial fidelity), Guardian second, GNews last (delayed feed)." Because dedupe keeps whichever copy it meets FIRST, the deliberate ordering of the input lists decides which publisher's version of a shared story survives:

`packages/api-client/src/aggregator.ts`
```ts
const merged = mergeAndDedupe([rssItems, guardianItems, newsApiItems, newsDataItems, gnewsItems]);
return merged.slice(0, limit);
```

GNews is last because its feed is delayed; if its copy of a story collides with a fresher RSS copy, the RSS one wins. The **gotcha**: shuffle that array and you silently change which source's headline, image, and link the user sees for duplicate stories. The order isn't decoration, it's a ranking decision.

One more layer lives in the lower-level `rss/index.ts`: an **F1-relevance filter**. Keyword-search APIs sometimes return cricket or tennis because the word "leader" or "qualifying" appeared in the body. So trusted dedicated feeds pass through, but keyword-API results must contain a real F1 token to survive:

`packages/api-client/src/rss/index.ts`
```ts
function looksLikeF1(item: RssItem): boolean {
  if (TRUSTED.has(item.source)) return true;            // curated feeds: trust them
  const hay = `${item.title} ${item.description ?? ''}`;
  return F1_REGEX.test(hay);                             // keyword APIs: must prove it
}
```

And `capPerSource` ensures no single fast-publishing source drowns the rail by limiting how many items each contributes. Together: fan out in parallel, filter for relevance, sort newest-first, dedupe by fingerprint with priority ordering, cap per source, slice to the limit. That's a production-grade news pipeline in about 170 lines, and every step exists to solve a real problem you'd hit if you removed it.

### Interview ammo

**Q: Your CLAUDE rule says "graceful degradation, return `[]` or `null`, never throw." Why is that the core rule and not just nice-to-have?**
The site prerenders pages at build time and pulls from 15 external APIs, so on any given build at least one is failing. If a single fetch threw, it would fail the whole page build and ship a broken site. Returning empty data means a failed source becomes a slightly shorter rail instead of a dead page, which is the difference between a robust product and a fragile one.

**Q: Walk me through the revalidate FLOOR pattern. Why does the client clamp the caller's value?**
Free news tiers have daily quotas (NewsAPI is 100/day). A cron pings the feed every 5 minutes, which at 300-second caching would be ~288 fetches/day and lock us out before noon. Each quota'd client wraps the caller's revalidate in `Math.max(revalidate, floor)`, so NewsAPI is floored to 1000s (~72/day), keeping every source safely under quota no matter what the caller requests.

**Q: How does the aggregator deduplicate the same story republished by five outlets?**
It computes two fingerprints per article: a normalized title (lowercased, punctuation and whitespace stripped) and a normalized URL (tracking params deleted, host plus path only). It walks the provider lists in priority order, storing seen fingerprints in a `Set`, and skips any article whose title or URL fingerprint was already seen, so only the first-seen (highest-priority) copy survives.

**Q: Why does Jolpica need pagination and what happens if you skip it?**
Jolpica caps a response at 100 rows. A driver with a long career (Hamilton, ~360 races) would return only the oldest 100, silently dropping recent wins and producing a wrong-but-plausible stats tally with no error. The fix loops with an increasing `offset`, appending each 100-row page until it reaches the reported total, with a hard `offset < 1200` ceiling to prevent a malformed total triggering an infinite request loop.

**Q: Explain exponential backoff with jitter and why both pieces matter.**
On a transient 429 or 5xx the client retries, waiting `500 * 2 ** attempt` milliseconds so each retry backs off twice as long, plus a random jitter of up to 250ms. The doubling avoids hammering a struggling server; the jitter prevents many concurrent build-time renders from retrying in perfect sync (a thundering herd) and re-triggering the same rate limit. Permanent failures like 404 skip retries entirely and degrade immediately.

**Q: Why use `Promise.all` instead of awaiting each provider in sequence?**
Sequential awaits add up: five providers at 300ms each is 1.5 seconds. `Promise.all` fires all requests in parallel and resolves when the slowest finishes, so total latency is one provider's time, not the sum. It also returns results in input order, which the aggregator relies on for its dedupe-priority tie-breaks.

## 4. The Database & Persistence Layer

### 4.0 The one-sentence mental model

Everything you have learned so far lives in memory: when a server restarts, RAM is wiped clean and forgets everything. The **database** is the one part of this whole app that *never forgets*. When a fan saves a prediction, when you publish an article, when the cron job records the latest championship standings, all of that flows down into this layer and is written to disk on a machine that stays alive even when your website is asleep. This section is the "permanent memory" of Apex F1.

> 🧠 Analogy: Your app's regular code is like your short-term memory · you forget what you had for breakfast three Tuesdays ago. The database is your diary · you wrote it down, so it is there forever, even after you sleep.

### 4.1 What a database actually is (a spreadsheet that never forgets)

Forget every scary word for a second. A **database** is just a giant, super-organized spreadsheet that survives forever and that thousands of programs can read and write at the same time without trampling each other.

A real spreadsheet (think Excel or Google Sheets) has:

- **Sheets / tabs** · one per "kind of thing." In a database these are called **tables**.
- **Columns** · the named fields, like "first name," "points," "published date." Every column has a fixed *type* (text, number, date).
- **Rows** · one actual record. One row in the `driver` table is one specific F1 driver.

In Apex F1, the tables you will meet in this section are:

| Table | One row = | Lives in file |
|-------|-----------|---------------|
| `article` | one editorial story | `schema/article.ts` |
| `prediction` | one fan's picks for one race | `schema/prediction.ts` |
| `standing_driver` / `standing_team` | one driver's/team's championship position at one point in the season | `schema/standing.ts` |
| `driver`, `team`, `season` | the "things" standings point at | `schema/driver.ts`, etc. |

The reason we use a real database instead of, say, a big JSON file is **concurrency** and **durability**: a database lets many users write at once without corrupting the file, guarantees the data is actually flushed to disk, and lets you ask sharp questions ("give me the top 10 fans by points this season") in milliseconds.

### 4.2 SQL · the language you "talk" to a database in

The database speaks one language: **SQL** (Structured Query Language). It is the universal "please do this" language for relational databases. There are really only four verbs you need to recognize:

- `SELECT` · read rows ("show me the latest 6 articles").
- `INSERT` · add a new row.
- `UPDATE` · change an existing row.
- `DELETE` · remove a row.

A raw SQL query to read articles would look like this:

```sql
SELECT slug, title, published_at
FROM article
WHERE published_at IS NOT NULL
ORDER BY published_at DESC
LIMIT 6;
```

Read it left to right and it is almost English: "select these columns from the article table, where published_at is filled in, ordered newest first, give me 6." You will see in a moment that the code in this repo never writes that raw string. It writes TypeScript that *compiles down to exactly this*. That bridge is the ORM.

### 4.3 Postgres and Supabase · whose computer is this?

This repo uses **PostgreSQL** (everyone says "Postgres"), the specific *brand* of SQL database. There are many brands (MySQL, SQLite, SQL Server); Postgres is the open-source, rock-solid, feature-rich one that serious products pick. It is the engine.

But an engine needs a car and a parking spot. **Supabase** is a hosting company that runs a Postgres database for you on their servers, gives you a connection string (a URL with a password in it), a web dashboard, backups, and authentication, so you do not have to run a database server on your own laptop. You can confirm this is the intent right in the code · the error message names Supabase explicitly:

File: `packages/db/src/client.ts`
```ts
const url = process.env.DATABASE_URL;
if (!url) {
  throw new Error('DATABASE_URL not set. Set it from your Supabase project connection string.');
}
```

> 🧠 Analogy: Postgres is the *engine*. Supabase is the *garage that owns the car, fuels it, and hands you the keys (the `DATABASE_URL`)*. You drive; they maintain.

**Why this choice and the alternatives:** the alternative is self-hosting Postgres on a VM you manage (more control, but you become the one paged at 3am when the disk fills up), or using a different managed provider (Neon, RDS, PlanetScale). Supabase was picked because it is free to start, Postgres-native, and bundles auth/storage. The gotcha: your database password is *in* that URL, so `DATABASE_URL` must always live in an environment variable, never be hard-coded or committed to git.

### 4.4 The ORM · why we write TypeScript, not raw SQL (Drizzle)

Writing raw SQL strings by hand is dangerous and tedious: typos aren't caught until runtime, and you can accidentally open the door to **SQL injection** (an attacker smuggling commands through user input). An **ORM** (Object-Relational Mapper) is a library that lets you describe your tables and queries in your normal programming language (here, TypeScript) and *generates the SQL for you*, type-checked.

This repo uses **Drizzle**, a modern, thin, TypeScript-first ORM. "Thin" matters · Drizzle's query builder looks almost identical to the SQL it produces, so you learn SQL by using it rather than hiding from it. Look at how the articles query mirrors the raw SQL from section 4.2:

File: `packages/db/src/queries.ts`
```ts
return await db
  .select(COLS)
  .from(article)
  .where(isNotNull(article.publishedAt))
  .orderBy(desc(article.publishedAt))
  .limit(limit);
```

`.select().from().where().orderBy().limit()` · it reads like the SQL, but now `article.publishedAt` is a real TypeScript object. If you misspell it, your editor screams *before* you ever run the app. That is the entire point of an ORM: catch mistakes at compile time, not in production.

> 🧠 Analogy: Raw SQL is writing a letter in a foreign language and hoping you spelled everything right. An ORM is a bilingual assistant · you speak your language, they write the perfect foreign letter and refuse to send it if it is gibberish.

**Alternatives:** Prisma (heavier, generates its own client and uses a custom schema language), TypeORM (older, class/decorator-based), or raw `pg`/`postgres` drivers (maximum control, zero safety). Drizzle was chosen for being lightweight, edge/serverless-friendly, and for keeping you close to real SQL.

### 4.5 Defining a table · reading the `article` schema line by line

A **schema** is the blueprint that says exactly what columns a table has and what type each is. In Drizzle you write the blueprint in TypeScript with `pgTable` ("pg" = Postgres).

File: `packages/db/src/schema/article.ts`
```ts
export const article = pgTable(
  'article',
  {
    id: uuid('id').primaryKey().defaultRandom(),
    slug: text('slug').notNull().unique(),
    title: text('title').notNull(),
    dek: text('dek'),
    bodyMd: text('body_md'),
    type: text('type', { enum: articleType }).notNull().default('news'),
    publishedAt: timestamp('published_at', { withTimezone: true }),
    updatedAt: timestamp('updated_at', { withTimezone: true }).defaultNow().notNull(),
    isBreaking: boolean('is_breaking').default(false).notNull(),
    createdAt: timestamp('created_at', { withTimezone: true }).defaultNow().notNull(),
  },
  ...
);
```

Decode the chain of method calls · each one is a rule:

- `uuid('id')` · the column is a **UUID** (a long random unique string like `9b1d...`), and `'id'` is its real name in the database.
- `.primaryKey()` · this is the **primary key**, the column that uniquely identifies a row (more in 4.7).
- `.defaultRandom()` · if you don't supply an id, Postgres invents a random UUID for you.
- `.notNull()` · this column can *never* be empty. `title` must always have a value; if you try to insert without one, the database rejects it.
- `.unique()` on `slug` · no two articles can share a slug. The database enforces it, not your code.
- `.default('news')` / `.defaultNow()` · if you omit the value, it fills in a sensible default automatically (the type column becomes `'news'`, the timestamp becomes "right now").
- `{ withTimezone: true }` · store the time *with* its timezone so "3pm" is unambiguous worldwide. The gotcha of *not* doing this is the classic bug where everyone's timestamps drift by hours depending on the server's location.

Notice `publishedAt` has *no* `.notNull()`. That nullability is load-bearing: a `null` publishedAt means **draft**, a filled-in one means **published**. The whole CMS publish/draft logic in 4.11 hinges on this one nullable column.

At the very bottom Drizzle hands you free TypeScript types derived from the table:

```ts
export type Article = typeof article.$inferSelect;   // shape when you read a row
export type NewArticle = typeof article.$inferInsert; // shape when you insert one
```

This is the magic of a TypeScript-first ORM: the table definition *is* the type. Change a column, and every place in the app that touches articles is instantly re-type-checked. No drift between database and code.

### 4.6 Indexes · the back-of-the-book that makes reads fast

At the end of the `article` table you see this:

```ts
(t) => ({
  publishedAtIdx: index('article_published_at_idx').on(t.publishedAt),
  typeIdx: index('article_type_idx').on(t.type),
}),
```

An **index** is a pre-sorted lookup structure the database keeps on the side so it can find rows *without scanning the whole table*. Our homepage query sorts by `publishedAt` constantly, so we put an index on `publishedAt`. With 10 articles it doesn't matter; with 100,000 it is the difference between 1ms and a frozen page.

> 🧠 Analogy: An index is the index at the back of a textbook. Without it, finding "mitochondria" means reading all 600 pages. With it, you flip to one entry and jump straight there.

The gotcha: indexes are not free · every `INSERT`/`UPDATE` has to also update the index, so you index the columns you *filter and sort by*, not every column.

### 4.7 Primary keys, foreign keys, and unique indexes (the heart of "relational")

These three concepts are the single most probed topic in database interviews. Learn them cold.

**Primary key** · the column that uniquely names a row. Every table here has `id: uuid(...).primaryKey()`. No two rows can share it; it is the row's social security number.

**Foreign key** · a column in one table that *points at* the primary key of another table, creating a relationship. This is what makes the database "relational." Look at standings:

File: `packages/db/src/schema/standing.ts`
```ts
seasonYear: integer('season_year')
  .notNull()
  .references(() => season.year, { onDelete: 'cascade' }),
driverId: uuid('driver_id')
  .notNull()
  .references(() => driver.id, { onDelete: 'cascade' }),
```

`.references(() => driver.id)` says: "the `driverId` here must be a real id that exists in the `driver` table." The database *refuses* to let you store a standing for a driver who doesn't exist. This is **referential integrity** · the data can never contradict itself.

`{ onDelete: 'cascade' }` is the cleanup rule: if a driver is deleted, all their standings rows are automatically deleted too (they "cascade" away), so you never have orphaned standings pointing at a ghost driver. Contrast with the article schema, where the author link uses `onDelete: 'set null'` · delete an author and their articles survive but become author-less. Two different policies for two different intents.

> 🧠 Analogy: A foreign key is a hyperlink between two web pages that the system *guarantees never 404s*. `cascade` = delete the page and all links to it vanish too; `set null` = the link just goes grey but the page stays.

**This is why standings must seed drivers first.** A foreign key has a strict ordering rule: the thing you point *at* must exist *before* you point at it. You cannot insert a `standing_driver` row whose `driverId` references a driver who isn't in the `driver` table yet · the database throws a foreign-key violation. That single rule dictates the exact order of operations in `seed.ts`, which we cover next.

**Unique index** · like `.unique()` but across a *combination* of columns. In standings:

```ts
seasonRoundDriverUnique: uniqueIndex('sd_unique').on(
  t.seasonYear, t.round, t.driverId,
),
```

This says: there can be at most **one** row for a given (season, round, driver) trio. You cannot accidentally store Verstappen's round-0 2026 standing twice. This guarantee is what makes "upsert" possible (4.10). In `prediction.ts` the same trick locks one fan to one prediction per race:

File: `packages/db/src/schema/prediction.ts`
```ts
clientRaceUq: uniqueIndex('prediction_client_race_uq').on(t.clientId, t.season, t.round),
```

### 4.8 The seed order · why `persistCurrentSeason` is so carefully sequenced

Now the foreign-key rule from 4.7 pays off. Watch the *order* the seeder writes things. It is not arbitrary; it is forced by the FK dependency chain (season → driver → standing).

File: `packages/db/src/seed.ts`
```ts
// 1. the season must exist first (standings reference season.year)
await db.insert(season).values({ year, status: 'active' })
  .onConflictDoUpdate({ target: season.year, set: { status: 'active', updatedAt: new Date() } });

for (const d of drivers) {
  // 2. the driver must exist + we grab its generated id back
  const [row] = await db.insert(driver).values({ slug: d.slug, /* ... */ })
    .onConflictDoUpdate({ target: driver.slug, set: { /* ... */ } })
    .returning({ id: driver.id });
  if (!row) continue;
  // 3. NOW we can insert the standing, because both FK targets exist
  await db.insert(standingDriver).values({
    seasonYear: year,
    driverId: row.id,   // <-- the id we just got back
    round: 0, position: d.position, points: d.points, wins: d.wins,
  }).onConflictDoUpdate({ /* ... */ });
}
```

Three things to absorb:

1. **Order is dictated by foreign keys.** Season, then driver, then standing. Flip any two and the database rejects the write. The function's own doc comment says it plainly: "upserts the season, then each driver + team (so the FK targets exist), then the latest standings snapshot."
2. **`.returning({ id: driver.id })`** · the driver's `id` is a random UUID *generated by the database*, so the only way to know what it is, is to ask the insert to hand it back. We capture it into `row.id` and immediately feed it into the standing as the foreign key. This insert-then-use-the-returned-id pattern is everywhere in relational code.
3. **`round: 0`** is a convention for "the latest snapshot" so there is exactly one current standings row per driver per season, which dovetails with the `sd_unique` constraint.

The function is also defensively wrapped: it returns `{ drivers: 0, teams: 0 }` if there is no `DATABASE_URL` and swallows errors in a `try/catch`. This is the repo's CORE RULE #1 (you saw it in `queries.ts` too): the database is *optional plumbing*, never throw, never crash the page · degrade gracefully.

### 4.9 JSONB · storing a flexible blob inside one column

Most columns hold one simple value. But a fan's prediction is a little bundle of four picks. Rather than making four columns (or four tables), the prediction stores them as a single **JSONB** column · Postgres's binary JSON type, which lets you keep structured data inside one cell *and still query into it*.

File: `packages/db/src/schema/prediction.ts`
```ts
export interface PredictionPicks {
  pole?: string;
  winner?: string;
  fastest_lap?: string;
  podium?: string;
}
// ...
picks: jsonb('picks').$type<PredictionPicks>().notNull(),
```

`.$type<PredictionPicks>()` is a beautiful Drizzle touch: the column is `jsonb` to Postgres, but TypeScript treats it as a strongly-typed `PredictionPicks` object. You get schema-less flexibility *and* type safety. When the consensus query later does `Object.entries(r.picks ?? {})` in `predictions.ts`, it is iterating that typed blob.

> 🧠 Analogy: A normal column is a labeled jar holding one thing. A JSONB column is a labeled lunchbox · still one slot in the fridge, but it holds a whole structured meal inside.

The gotcha: JSONB is great for "data that travels together and you rarely filter on the inside." If you constantly needed to query "all predictions where winner = VER" at scale, separate columns/tables with indexes would beat it. For four optional picks read as a unit, JSONB is the right call.

### 4.10 UPSERT and idempotency · the most important pattern in this layer

Look back at every write in `seed.ts` and `predictions.ts`. None of them is a plain `INSERT`. They are all `insert(...).onConflictDoUpdate(...)`. This is an **UPSERT** · "INSERT if it's new, UPDATE if it already exists." In raw SQL it is `INSERT ... ON CONFLICT ... DO UPDATE`.

File: `packages/db/src/predictions.ts`
```ts
await db
  .insert(prediction)
  .values({ clientId: input.clientId, season: input.season, round: input.round, picks: input.picks, updatedAt: new Date() })
  .onConflictDoUpdate({
    target: [prediction.clientId, prediction.season, prediction.round],
    set: { picks: input.picks, handle: input.handle ?? null, updatedAt: new Date() },
  });
```

Read it as: "Try to insert this fan's picks. *If* a row already exists with the same (clientId, season, round) · which the `prediction_client_race_uq` unique index defines as a 'conflict' · then instead of erroring, just UPDATE that row's picks." The `target` is *literally the unique index columns from 4.7*. That is the connection: a unique index defines what "the same row" means, and `onConflictDoUpdate` uses it.

This gives you **idempotency** · the property that running the same operation once or a hundred times produces the same final state. A fan can hit "save predictions" ten times; you get one row, last write wins, no duplicates, no crash. The cron job re-seeding standings every hour just overwrites the round-0 snapshot · no duplicate explosion.

> 🧠 Analogy: Idempotent = a light switch labeled "ON," not a button that toggles. Press it once or fifty times, the light is just on. UPSERT is that switch for database rows.

**Why this matters so much in serverless / cron land:** retries are a fact of life. A cron run can time out and re-fire; a serverless function can be invoked twice for one request. Plain `INSERT` would throw "duplicate key" on the retry. UPSERT makes retries *safe*. This is exactly why interviewers love it.

### 4.11 Connection pooling · the concept interviewers probe hardest

Here is the deepest idea in this section. Read it twice.

Opening a connection to Postgres is *expensive* · a TCP handshake, authentication, memory allocation on the database server. Postgres can only hold a few hundred connections open at once before it falls over. In a traditional always-on server you open a handful of connections once and reuse them forever. Fine.

But this app is **serverless** (Vercel functions). Each request can spin up a brand-new, short-lived function instance. If every instance opens its own direct connection to Postgres, then a traffic spike of 500 concurrent requests = 500 connections = Postgres dies. This is the infamous "serverless connection storm."

The fix is a **connection pooler** · a middleman (Supabase uses one called Supavisor, historically PgBouncer) that keeps a small pool of real connections to Postgres and hands them out to your many short-lived functions. Your 500 functions talk to the pooler; the pooler multiplexes them over, say, 15 real Postgres connections.

Supabase exposes this as different ports on the connection string, and you *must* pick the right one:

| Mode | Port | Use it when | What it does |
|------|------|-------------|--------------|
| **Direct** | 5432 | long-running scripts, migrations | one client = one real Postgres connection |
| **Session pooler** | 5432 (pooler host) | persistent servers needing a stable session | a real connection held for your whole session |
| **Transaction pooler** | **6543** | **serverless / Vercel functions** | a connection is borrowed only for the duration of one transaction, then returned |

For Apex F1's serverless functions you use the **transaction pooler on port 6543**. That is the whole game.

But the transaction pooler comes with one critical catch, and the code handles it on exactly one line:

File: `packages/db/src/client.ts`
```ts
const client = postgres(url, { max: 10, prepare: false });
```

`prepare: false` is non-negotiable with the transaction pooler. Here is why: a **prepared statement** is when the driver tells Postgres "remember this query plan as statement S1, I'll reuse it." That memory lives *on a specific connection*. But the transaction pooler gives your next query a *different* physical connection that has never heard of S1, so the prepared statement vanishes and you get cryptic "prepared statement does not exist" errors. Disabling prepared statements (`prepare: false`) makes every query self-contained so it works no matter which pooled connection it lands on.

`max: 10` caps how many connections *this driver instance* will open · a second layer of politeness so one warm function can't hog the pool.

> 🧠 Analogy: The pooler is a coat check at a theater. There are 1,000 guests (function invocations) but only 15 hooks (real connections). You hand in your coat (run a transaction), get it back, free the hook for the next guest. `prepare: false` is the rule "don't write secret notes on your specific hook" · because next time you'll be assigned a different hook.

**The gotcha if you do it wrong:** use port 5432 (direct) from serverless and you get random "too many connections" crashes under load. Use 6543 but forget `prepare: false` and you get random "prepared statement s0 already exists / does not exist" errors. Both are textbook serverless-Postgres failure modes, and both are solved by those two parameters.

### 4.12 The lazy singleton · why `getDb()` caches the client

One more detail in `client.ts` that interviewers like:

File: `packages/db/src/client.ts`
```ts
let _db: ReturnType<typeof drizzle<typeof schema>> | null = null;

export function getDb() {
  if (_db) return _db;
  const url = process.env.DATABASE_URL;
  if (!url) throw new Error('DATABASE_URL not set. ...');
  const client = postgres(url, { max: 10, prepare: false });
  _db = drizzle(client, { schema });
  return _db;
}
```

This is the **lazy singleton** pattern. "Singleton" = there is only ever *one* db client in the whole process, cached in the module-level `_db` variable. "Lazy" = it is not created until the first time `getDb()` is called. Within one warm serverless instance, every query reuses the same pooled client instead of opening a fresh one per call. The first call builds it; every call after returns the cached `_db`. This pairs with the pooler: you want to reuse the warm client, not reconnect on every function call.

### 4.13 Migrations vs `drizzle-kit push` · how the schema gets into the real database

Your TypeScript schema is just a blueprint. The real Postgres database needs actual `CREATE TABLE` statements run against it. **drizzle-kit** is the CLI tool that bridges blueprint → real database. Its config tells it where the schema lives and where to put generated SQL:

File: `packages/db/drizzle.config.ts`
```ts
export default defineConfig({
  schema: './src/schema/index.ts',
  out: './migrations',
  dialect: 'postgresql',
  dbCredentials: { url: url ?? '' },
  strict: true,
  verbose: true,
});
```

There are two philosophies for applying schema:

- **`drizzle-kit push`** · compares your TypeScript schema to the live database and *immediately* alters the live database to match. Fast, no files, great for prototyping and solo dev. The downside: there is no recorded history of *how* the schema changed, and it can be risky on production data (it may want to drop a column to "match").
- **Migrations** (`drizzle-kit generate` then `migrate`) · generates timestamped `.sql` files into the `out: './migrations'` folder, which you commit to git. Each file is one reviewable, replayable step. This is the production-grade path: you can see history, roll forward predictably, and apply the exact same changes in every environment.

The config points `out` at `./migrations`, so the project is wired for the file-based migration path even if `push` is used during fast iteration. `strict: true` makes drizzle-kit ask for confirmation before destructive changes · a guardrail against accidentally dropping a column full of data.

> 🧠 Analogy: `push` is editing a shared Google Doc live · instant, but no track-changes. Migrations are submitting numbered, reviewed edit requests · slower, but you have a full paper trail and can replay every change on a fresh copy.

### 4.14 The full round trip · how the Articles CMS writes and reads

Now let's connect this layer to the outside world by following one article end to end. The write side is the API route:

File: `apps/web/app/api/articles/route.ts`
```ts
export async function POST(req: Request) {
  if (!process.env.DATABASE_URL) {
    return NextResponse.json({ ok: false, error: 'DATABASE_URL not set.' }, { status: 503 });
  }
  // ...validate title, slug (SLUG_RE), bodyMd...
  const db = getDb();
  const [row] = await db
    .insert(article)
    .values({
      slug, title, dek, bodyMd,
      excerpt: (dek ?? bodyMd).slice(0, 200),
      readTimeMinutes: Math.max(1, Math.round(wordCount / 200)),
      publishedAt: body.status === 'published' ? new Date() : null,
    })
    .returning({ id: article.id, slug: article.slug });

  revalidatePath('/latest');
  revalidatePath('/');
  return NextResponse.json({ ok: true, id: row?.id, slug: row?.slug });
}
```

Walk the steps · this is a textbook write path:

1. **Guard first.** No `DATABASE_URL` → return `503` (service unavailable), never crash.
2. **Validate before touching the database.** `SLUG_RE` (`/^[a-z0-9][a-z0-9-]{0,98}[a-z0-9]$/`) ensures the slug is URL-safe; missing title/body → `400`. Never trust client input.
3. **Derive fields.** `readTimeMinutes` is computed from word count (≈200 words/minute); `excerpt` is auto-cut to 200 chars. The CMS does the busywork.
4. **The publish toggle lives here:** `publishedAt: body.status === 'published' ? new Date() : null`. A draft saves `null`; publishing stamps the current time. This is the exact nullable column from 4.5 doing its job.
5. **`.returning(...)`** hands back the generated id and slug to confirm the write.
6. **`revalidatePath('/latest')` and `'/'`** · this is the Next.js link back to the rendering layer: it tells Next to throw away its cached homepage and `/latest` page so the brand-new article appears instantly. The database write and the cache invalidation are coordinated in one request.
7. **The unique constraint is caught gracefully:** the `catch` block sniffs the error for `/duplicate key|unique/i` and returns a friendly `409 Conflict` ("slug already exists") instead of a raw `500`. That `409` is the `.unique()` rule from the `slug` column surfacing to the user.

The read side is the query module from 4.4 (`getPublishedArticles`), which filters `isNotNull(article.publishedAt)` · so drafts (null publishedAt) are invisible to the public, and only published stories with a timestamp ever reach the homepage. Write stamps the time; read filters on the time. The two halves are designed as a pair.

### Interview ammo

**Q: Why does this app need a connection pooler, and why the transaction pooler specifically (port 6543)?**
Serverless functions spin up many short-lived instances; if each opened a direct Postgres connection (port 5432), a traffic spike would exhaust Postgres's connection limit and crash it. A pooler keeps a small set of real connections and multiplexes thousands of functions over them. The transaction pooler (6543) borrows a connection only for one transaction and returns it, which fits serverless's bursty, short-lived nature perfectly.

**Q: What is `prepare: false` in `client.ts` and why is it mandatory here?**
A prepared statement caches a query plan on one specific physical connection. The transaction pooler hands each query a different pooled connection, so a previously prepared statement won't exist there, causing "prepared statement does not exist" errors. Setting `prepare: false` makes every query self-contained so it works on any pooled connection.

**Q: Explain UPSERT and why it gives you idempotency.**
UPSERT (`INSERT ... ON CONFLICT DO UPDATE`, or Drizzle's `onConflictDoUpdate`) inserts a row, or updates it if a row already exists on the conflict target. The target is a unique index, like `(clientId, season, round)` for predictions. This makes writes idempotent: running them once or many times yields the same final state, so retries from crons or double-invoked serverless functions are safe instead of throwing duplicate-key errors.

**Q: Why must `persistCurrentSeason` seed the season and drivers before standings?**
Standings have foreign keys (`.references(() => driver.id)`, `.references(() => season.year)`), and a foreign key requires the referenced row to already exist. Inserting a standing for a driver who isn't in the `driver` table yet triggers a foreign-key violation. So the code inserts season → driver (grabbing the generated id via `.returning()`) → standing, in that strict order.

**Q: What is an ORM and why Drizzle over raw SQL or Prisma?**
An ORM lets you describe tables and queries in your programming language and generates type-checked SQL, catching errors at compile time and preventing SQL injection. Drizzle was chosen because it is lightweight, serverless-friendly, TypeScript-first (the table definition produces the types via `$inferSelect`/`$inferInsert`), and stays close to real SQL, unlike Prisma which is heavier and uses its own schema language and generated client.

**Q: How does the CMS distinguish a draft from a published article?**
The `publishedAt` timestamp column is nullable. The POST route sets it to `new Date()` only when `status === 'published'`, otherwise `null`. The public read query filters `isNotNull(article.publishedAt)`, so drafts never appear on the homepage. One nullable column drives the entire publish/draft state, and on publish the route calls `revalidatePath` to refresh the cached pages.
