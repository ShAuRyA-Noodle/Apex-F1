## 7. War Stories — Every Bug, Hard Problem & Lesson

This is the section where the codebase stops being a tidy diagram and becomes a battlefield. Every file you touched on the way to shipping Apex has a scar on it, and each scar is a lesson that cost real hours. The goal here is not to make you feel the pain again. It is to make sure that the next time you hit the same shape of problem, in this project or any other, you recognize it in ten seconds instead of two hours. We will walk every war story the same way: **what broke**, **the symptom you actually saw**, **the root cause in plain terms**, **the fix that is sitting in the repo right now**, and **the general lesson** that survives long after you forget Formula 1 ever existed.

> 🧠 Analogy: A war story is like a scar with a story attached. The scar is ugly, but the story is the whole point. You do not remove the scar, you remember how you got it so you never grab that hot pan again.

### 7.1 The Jolpica 429 that killed the build

**What broke.** During `next build`, Next.js tries to pre-render as many pages as it can up front (this is called **prerendering** or **static generation**). To pre-render a driver page, it has to call the Jolpica F1 history API. But the build does this for dozens of pages all at once, in a burst, in a few seconds. Jolpica is a free community API and it does not like bursts.

**The symptom.** The build would fail partway through with HTTP **429 Too Many Requests** coming back from `api.jolpi.ca`, and because the page's data-fetching code threw on a bad response, the thrown error bubbled up and Next.js marked the whole build as failed. One rate-limited request, zero deployed site.

**Root cause in plain terms.** Two mistakes stacked on top of each other. First, the client treated *any* non-OK response as a fatal error and threw. Second, a build fires many requests in a tight window, which is exactly the thing a free API rate-limits. So the build was guaranteed to occasionally trip the limit, and when it did, the thrown error had nowhere safe to land.

**The fix.** Two ideas, both living in `packages/api-client/src/jolpica/client.ts`. The first is **retry with exponential backoff and jitter**: when you get a 429 or a 5xx, do not give up, wait a bit and try again, and wait longer each time.

`packages/api-client/src/jolpica/client.ts`
```ts
const MAX_RETRIES = 3;
const sleep = (ms: number) => new Promise((r) => setTimeout(r, ms));

// inside get():
if (res.status === 429 || res.status >= 500) {
  if (attempt < MAX_RETRIES) {
    await sleep(500 * 2 ** attempt + Math.floor(Math.random() * 250));
    continue;
  }
  return emptyEnvelope<T>();
}
```

Read `500 * 2 ** attempt` carefully. On attempt 0 you wait ~500ms, attempt 1 ~1000ms, attempt 2 ~2000ms. That doubling is the **exponential backoff**. The `+ Math.floor(Math.random() * 250)` is **jitter**, a small random nudge so that if ten pages all got rate-limited at the same instant, they do not all wake up and retry at the *exact same* instant and re-collide. Jitter is the difference between a crowd leaving a stadium in a stampede versus in staggered waves.

The second idea is **graceful degradation**. When all retries are exhausted, the client does not throw. It returns a fake-but-valid empty response shaped exactly like a real one:

`packages/api-client/src/jolpica/client.ts`
```ts
function emptyEnvelope<T>(): JolpicaEnvelope<T> {
  return {
    MRData: {
      RaceTable: { Races: [] },
      StandingsTable: { StandingsLists: [] },
      DriverTable: { Drivers: [] },
      // ...
    },
  } as unknown as JolpicaEnvelope<T>;
}
```

Because every public method then does `?? []` or `?? null` on the way out (look at `getDriverStandings`: `StandingsLists[0]?.DriverStandings ?? []`), a total API outage degrades a page to "no data yet" instead of crashing the build. The page renders empty, the build succeeds, and the next ISR revalidation fills it in for real.

**General lesson.** A network call has three outcomes, not two: success, *transient* failure (retry it), and *permanent* failure (degrade, do not crash). Treating "the response was not 200" as a single fatal case is the most common rookie mistake in any app that talks to the internet. Build-time data fetching is especially dangerous because one bad request can take down your entire deploy, not just one page view. Always ask: "if this API is down for 60 seconds during my build, does my whole site fail to ship?" If yes, you have not finished the feature.

### 7.2 The 100-per-page pagination trap (silent wrong data)

**What broke.** Jolpica caps every list response at **100 items per page**. If you ask for "all of Lewis Hamilton's race results" (he has around 360), you get back the *first* 100 and nothing tells you there are more. The response looks complete. It is not.

**The symptom.** This one is nastier than a crash because there was no crash. Win counts, podium tallies, and career stats were quietly *wrong*, showing a fraction of a driver's real numbers, with no error anywhere. A silent data bug is the worst kind because nothing alerts you. You only catch it by knowing the right answer (Hamilton has way more than 100 results) and noticing the page disagrees.

**Root cause in plain terms.** The API does not hand you everything. It hands you a page and a `total` count, and it is *your* job to keep asking for the next page until you have all of them.

**The fix.** A pagination loop that reads `total` from the first response and walks the offset forward in steps of 100 until it has them all. From `getDriverResults`:

`packages/api-client/src/jolpica/client.ts`
```ts
const PAGE = 100;
const first = await get<JolpicaResultsEnvelope>(`drivers/${driverId}/results.json`, {
  revalidate: 3600, limit: PAGE, offset: 0, ...opts,
});
const races = [...first.MRData.RaceTable.Races];
const total = Number((first.MRData as { total?: string }).total) || races.length;
for (let offset = PAGE; offset < total && offset < 1200; offset += PAGE) {
  const env = await get<JolpicaResultsEnvelope>(`drivers/${driverId}/results.json`, {
    revalidate: 3600, limit: PAGE, offset, ...opts,
  });
  races.push(...env.MRData.RaceTable.Races);
}
return races;
```

Notice the `&& offset < 1200` guard. That is a **safety cap** so a buggy `total` value can never spin this loop into thousands of requests and hammer the API (or hang the build). The same pattern appears in `getAllDrivers` to walk all ~880 drivers in F1 history.

**General lesson.** Whenever a list API has a `limit` parameter, assume it has a *maximum* limit and that you are getting a truncated page. Always look for the `total` (or `nextPage`, or `hasMore`) field and loop until you have everything. And always put a hard ceiling on the loop so a bad count cannot turn pagination into a denial-of-service attack against your own data source. Silent truncation is more dangerous than a loud crash because nothing tells you it happened.

### 7.3 The OpenF1 colon that URL-encoding silently ate

**What broke.** The live telemetry map needs GPS samples for a narrow time window, so it calls OpenF1's `/location` endpoint with filters like `date>=2024-05-26T13:00:00`. OpenF1 uses literal `>=` and `<=` operators and a literal colon-bearing timestamp directly in the query string.

**The symptom.** The date filter just... did not work. Instead of returning a few seconds of GPS data, the endpoint returned the *entire session*, a giant payload that was slow, occasionally timed out, and was useless for plotting a clean window. No error. The request "succeeded" and gave back the wrong thing.

**Root cause in plain terms.** The "normal" way to build a URL in JavaScript is `URL` + `searchParams.set()`, which is correct and safe for almost everything because it **URL-encodes** special characters. It turns `:` into `%3A` and `>` into `%3E`. But OpenF1's filter parser wants those characters *raw*. When `searchParams` politely encoded the colons and operators, OpenF1 could not recognize the filter, so it ignored it and returned everything.

**The fix.** For this one endpoint, stop using `searchParams` and build the query string by hand so the colons and operators stay literal. From `getLocation`:

`packages/api-client/src/openf1/index.ts`
```ts
// OpenF1 wants a naive UTC datetime (YYYY-MM-DDTHH:MM:SS) and its date>= /
// date<= operators must stay literal — URL-encoding the colons silently
// drops the filter and returns the whole session.
const fmt = (d: string) => d.slice(0, 19);
const parts = [`session_key=${sessionKey}`];
if (opts.driverNumber != null) parts.push(`driver_number=${opts.driverNumber}`);
if (opts.dateGte) parts.push(`date>=${fmt(opts.dateGte)}`);
if (opts.dateLte) parts.push(`date<=${fmt(opts.dateLte)}`);
const url = `${BASE}/location?${parts.join('&')}`;
```

The `fmt` helper also slices the timestamp to 19 characters (`YYYY-MM-DDTHH:MM:SS`), dropping the milliseconds and `Z` that OpenF1 does not want. Both choices are about matching the server's exact expectations rather than the "textbook correct" encoded form.

**General lesson.** URL encoding is correct 95% of the time, which is exactly why the 5% will bite you. Some APIs have homegrown query parsers that expect raw characters. When a filter "does nothing" but the request succeeds, suspect that your safe encoder mangled a character the server treats as a control symbol. The debugging move is: copy the URL your code actually built, paste it into a browser or curl, and compare it byte-for-byte against the URL from the API's own docs. The difference is usually a `%3A` where there should be a `:`.

### 7.4 The string-import vs static-import bundler trap

**What broke.** The YouTube sync cron needs to write videos to Supabase, but at the time the route was written the `@apex/db` package was still half-built. The instinct is to import it lazily so the route can build and run even when the DB is not ready.

**The symptom.** Depending on how you reach for an optional dependency, you get one of two bad outcomes. If you `import` it statically at the top and the package is broken or missing an env var, the whole route fails to build. If you try to dodge that with a dynamically computed `await import(someString)`, bundlers like Next.js/Turbopack cannot statically analyze a *string* import path, so they either fail to bundle the dependency at all (runtime "module not found") or throw warnings and unpredictable behavior.

**Root cause in plain terms.** A bundler reads your imports at build time to decide what to pack into the deployed function. It can only follow imports it can *see literally*. `import { persistVideos } from '@apex/db'` is visible and analyzable. `await import(variableHoldingAPath)` is opaque, the bundler does not know what to include. The trap is reaching for the "clever" dynamic-string form to make something optional, and getting an undeployable build.

**The fix.** Import `persistVideos` *statically* with a literal path so the bundler can see it, and make it optional at *runtime* by wrapping the call in try/catch instead of trying to make the *import* conditional:

`apps/web/app/api/cron/youtube-sync/route.ts`
```ts
import { persistVideos } from '@apex/db';
// ...
let persisted = 0;
try {
  persisted = await persistVideos(allDetails);
} catch (err) {
  // Persistence failure must NOT poison the response · quota was already spent.
  // The next run will see the same rows and idempotently upsert.
  perChannelReports.push({ /* ...error report... */ });
}
```

For this to be safe, `@apex/db` must export a `persistVideos` that no-ops gracefully when the service key is absent, rather than throwing at import time. The lesson the comment encodes ("import lazily so the route still builds before @apex/db ships") was achieved through *runtime* tolerance, not a magic import.

**General lesson.** Keep import paths static and literal so the bundler can follow them. If you need optional behavior, make it optional at *runtime* (try/catch, feature flags, env checks), not by hiding the import behind a computed string. Dynamic `import()` is fine when the path is a literal (for genuine code-splitting), but the moment the path is a variable, you have left the territory bundlers understand.

### 7.5 The `workspace:*` deploy failure

**What broke.** This is a **pnpm monorepo**. Look at `apps/web/package.json`:

`apps/web/package.json`
```json
"@apex/api-client": "workspace:*",
"@apex/db": "workspace:*",
"@apex/types": "workspace:*",
"@apex/ui": "workspace:*",
```

`workspace:*` is a special protocol meaning "use the copy of this package that lives in *this same repo*, whatever its version is." It is wonderful locally. It is meaningless to a plain `npm install`, which does not understand the `workspace:` protocol at all and tries to fetch `@apex/db` from the public npm registry, where it does not exist.

**The symptom.** Deploy fails at the install step with something like "unsupported URL type workspace:" or "404 Not Found @apex/db". The site builds perfectly on your laptop and refuses to install in CI.

**Root cause in plain terms.** `workspace:*` is a pnpm-only (and yarn/bun) feature. If the deploy platform installs with the wrong package manager, it has never heard of the protocol. The fix is making sure the deploy uses pnpm and knows this is a workspace.

**The fix.** The root `package.json` pins the package manager explicitly so Vercel's autodetection installs with the right tool:

`package.json`
```json
"packageManager": "pnpm@10.33.0",
```

Combined with `next.config.ts` declaring `transpilePackages: ['@apex/ui', '@apex/types', '@apex/api-client', '@apex/db']`, so Next.js compiles the raw TypeScript of those local packages instead of expecting pre-built published artifacts, and `turbopack.root` pointing at the monorepo root so the bundler resolves across the workspace. The crons themselves live in `apps/web/vercel.json`, so Vercel treats `apps/web` as the project root.

**General lesson.** `workspace:*` only works with a workspace-aware package manager and a build that knows where the monorepo root is. The three things that must agree for a monorepo to deploy: (1) the deploy platform installs with the *same* package manager you use locally (pin it via `packageManager`), (2) your framework transpiles your local packages (`transpilePackages`), and (3) the bundler knows the workspace root. If any one is missing, "works on my machine" becomes "404 in CI."

### 7.6 ISR baking empty data into the cache

**What broke.** **ISR (Incremental Static Regeneration)** means Next.js renders a page once, caches the HTML, serves that cache to everyone for `revalidate` seconds, then re-renders in the background. It is what makes the site fast. But the cache does not care whether the data was good or bad. If the render that produced the cache happened during an API brownout, *empty* data gets baked into the cache and served to every visitor for the full revalidate window.

**The symptom.** A page shows "no data" for an hour even though the API recovered thirty seconds after the bad render. The map is blank, the standings are empty, and refreshing does nothing because everyone is being served the same stale-empty cache entry.

**Root cause in plain terms.** Caching amplifies whatever it captures. Cache a good render, everyone gets fast and correct. Cache a *bad* render, everyone gets fast and wrong, for the entire TTL. The danger is highest on the heaviest, flakiest endpoints, which is exactly where you most want caching.

**The fix.** Retry *before* the value is allowed to enter the cache, so a transient failure does not get immortalized. This is the real reason `getLocation` has its own retry loop on top of the 429 handling:

`packages/api-client/src/openf1/index.ts`
```ts
// /location is heavy and occasionally times out; retry so a flaky fetch
// doesn't bake an empty map into the ISR cache.
for (let attempt = 0; attempt <= 2; attempt++) {
  try {
    const res = await fetchImpl(url, {
      next: opts.revalidate != null ? { revalidate: opts.revalidate } : undefined,
    } as RequestInit);
    if (res.ok) return (await res.json()) as OpenF1Location[];
    if ((res.status === 429 || res.status >= 500) && attempt < 2) {
      await new Promise((r) => setTimeout(r, 600 * 2 ** attempt));
      continue;
    }
    return [];
  } catch { /* retry then return [] */ }
}
```

Different endpoints also get different `revalidate` windows on purpose: live intervals at 5 seconds, standings at 300 seconds, historical drivers at 86400 seconds (a day). A long TTL on flaky data is a long time to serve garbage, so the flakier-and-fresher the data, the shorter the cache and the more important the pre-cache retry.

**General lesson.** A cache is a megaphone for whatever you put in it. Validate and retry *before* a value is cacheable, never after. Match your TTL to how fast the data changes *and* how confident you are it is correct. The heavier and flakier the source, the harder you should fight to never let a bad value reach the cache, because the cache will faithfully repeat your mistake to every single visitor until the timer runs out.

### 7.7 The em-dash sweep (why punctuation outs AI writing)

**What broke.** Nothing technically. But across the site's copy, the em dash (—) and en dash (–) were everywhere, because that is the default rhythm of AI-generated prose. Reviewers and readers have learned to read a wall of em dashes as "a machine wrote this," which quietly undercuts a premium, human-crafted brand.

**The symptom.** Copy that "felt" generated even when the content was good. It is a vibe, not a bug, but for a portfolio piece you will defend in interviews, "this reads like ChatGPT" is a real cost.

**Root cause in plain terms.** Large language models overuse the em dash because it is a flexible, low-risk connector. Humans writing under deadline reach for commas, periods, and the occasional middle dot (·) instead. So a high density of em dashes is a statistical fingerprint of machine writing.

**The fix.** A deliberate sweep replacing em/en dashes with commas, periods, or the middle dot used as a stylistic separator (you can see it in the code comments themselves: "100 units · ~5% of 10,000 daily quota"). This very document is written under the same rule.

**General lesson.** The tells of AI writing are mostly punctuation and rhythm, not vocabulary. If you want copy to read as human and intentional, watch your em-dash density, kill filler transitions, and vary sentence length. This matters double for a project you will present as *yours*. The reviewer's snap judgment about authorship happens in the first paragraph, before they read a single line of your code.

### 7.8 The DNS records that simply were not there

**What broke.** The deploy succeeded, the app ran on its `.vercel.app` URL, but the custom domain showed nothing, or a certificate error, or an endless spinner.

**The symptom.** "It works on the Vercel URL but my real domain is broken." No code error, no build error. The application was completely healthy and completely unreachable at the address that mattered.

**Root cause in plain terms.** A domain only points at your server if the **DNS records** (the `A` / `CNAME` entries at your domain registrar) actually exist and point at Vercel. This is configuration that lives at your registrar, *outside* the codebase entirely. The records were simply absent, so the internet had no idea where to send visitors. DNS also takes time to **propagate** (spread across the world's resolvers), so even after you add the records it can look broken for minutes to hours.

**The fix.** Add the exact `A`/`CNAME` records Vercel asks for in its domain settings, then wait for propagation and the automatic TLS certificate to issue. There is no code change. The fix lives in the registrar dashboard.

**General lesson.** "It works on the platform URL but not my domain" is almost always DNS, and DNS is infrastructure that does not live in your repo. When debugging, separate the three independent things: is the *app* healthy (test the `.vercel.app` URL), does the *domain* resolve (`dig yourdomain.com`), and has the *certificate* issued. Grepping your code for a problem that lives in your registrar's control panel will burn an afternoon. Always confirm which layer is actually broken before you start editing files.

### 7.9 What is still missing (the honest list)

A masterclass that only shows the wins is a sales pitch. Here is what this codebase does *not* have yet, stated plainly so you can answer the interview question "what would you do next?" with credibility instead of bluffing.

- **No automated tests.** There is no test runner wired up, no unit tests on the pagination loops, no integration test that the 429 retry actually degrades to empty. The clients were *designed* to be testable (note `fetchImpl?: typeof fetch` in the options, an injection seam built precisely so a fake fetch can be passed in), but the tests were never written. The pagination math and the empty-envelope fallback are exactly the kind of pure logic that is cheap to test and expensive to get wrong silently.
- **No load testing.** Nobody has fired thousands of concurrent requests at it. The retry/backoff is reasoned, not measured. Under real load the free-tier API limits might cascade in ways the current backoff does not absorb.
- **Single region.** It deploys to one Vercel region. A user on the far side of the planet eats the full round-trip latency, and there is no failover region.
- **Free-tier limits everywhere.** Jolpica rate-limits, OpenF1 rate-limits, YouTube gives 10,000 quota units a day (the cron spends ~505, comfortable, but only because it is one cron, not a real user base), Vercel's hobby plan caps function `maxDuration` at 60 seconds (see `export const maxDuration = 60` in the cron route) and forced the crons down to daily schedules. Real traffic would hit a paywall fast.
- **Legal / trademark gray area.** This is an *unofficial* F1 fan project (the root `package.json` description says so: "unofficial Formula 1 fan platform"). "Formula 1" and "F1" are trademarks. Scraping and rebranding live timing data into a polished product that looks official is a real legal risk that a hobby project ignores and a business cannot.

> 🧠 Analogy: This list is the "known issues" sign at the entrance of a ride. The ride is fun and safe enough to open, but pretending the sign does not exist is how people get hurt and how engineers lose credibility in interviews.

### 7.10 If I rebuilt this from scratch, I would...

- **Write the tests first for the data layer.** The `fetchImpl` injection seam is already there. I would add unit tests proving: pagination assembles all pages, a 429 retries then degrades to empty, the OpenF1 URL keeps literal colons, and the empty envelope never throws. This is the highest-value testing in the whole app because it is pure logic guarding silent data bugs.
- **Add a tiny caching layer I control** (a small KV/Redis with explicit "only cache successful, non-empty results") instead of leaning entirely on ISR, so a bad render can *never* get promoted into the cache, removing story 7.6 by construction rather than by careful retry timing.
- **Centralize the fetch wrapper.** Right now Jolpica and OpenF1 each reimplement their own retry/backoff/degrade loop. I would extract one resilient `fetchJson` (retries, jitter, timeout, typed empty fallback) and have both clients use it, so the resilience logic has one home and one set of tests.
- **Pin and document the deploy contract.** A one-page note: pnpm via `packageManager`, `transpilePackages` for every local package, turbopack root, where the crons live. Story 7.5 only happens once if the contract is written down.
- **Treat DNS and infra as part of "done."** A deploy checklist that includes "custom domain resolves, certificate issued, crons firing" so the project is not "finished" the moment the `.vercel.app` URL loads.
- **Decide the legal posture on purpose.** Either lean hard into unmistakable "unofficial fan project" framing, or do not use the trademarks at all. Make it a deliberate choice up front, not an accident I discover when a cease-and-desist arrives.
- **Pick paid tiers (or self-hosted mirrors) before building features that assume the data is always there**, so resilience is a safety net rather than the primary plan, and a few real users do not instantly exhaust a free quota.

### Interview ammo

**Q: How do you stop a flaky third-party API from breaking your build?**
A: Build-time data fetches must never throw on a transient failure. I retry 429/5xx responses with exponential backoff plus jitter, and after exhausting retries I return a valid empty shape that every caller defaults through with `?? []`. The page renders empty, the build succeeds, and ISR fills it in later.

**Q: What is the danger of an API that paginates at 100 items, and how did you handle it?**
A: It silently truncates, you get the first 100 with no error, so stats end up quietly wrong, which is worse than a crash. I read the `total` field and loop through offsets until I have everything, with a hard cap on the loop so a bad count cannot turn into a denial-of-service against the data source.

**Q: You added a date filter to an API call and it returned the entire dataset anyway. What is your first hypothesis?**
A: My URL encoder mangled a control character. `URLSearchParams` encodes colons and operators, but some APIs have homegrown query parsers that need them literal, so the filter is silently ignored. I compare the URL my code built byte-for-byte against the API docs, and if needed build that one query string by hand.

**Q: Why can a dynamic `import()` break your deployed bundle?**
A: Bundlers follow imports they can read literally at build time. A static `import { x } from 'pkg'` is analyzable, but `await import(someVariable)` is opaque, so the bundler may not include the module and you get a runtime "module not found." For optional dependencies I import statically and make the behavior optional at runtime with try/catch, not by hiding the import path.

**Q: Why does `workspace:*` work locally but fail on deploy?**
A: `workspace:*` is a pnpm/yarn workspace protocol meaning "use the local copy in this repo." Plain npm does not understand it and tries to fetch the package from the public registry, which 404s. The fix is pinning the package manager (`"packageManager": "pnpm@..."`) so the deploy installs with a workspace-aware tool, plus transpiling the local packages in the framework config.

**Q: How can caching make a bug worse instead of better?**
A: A cache faithfully repeats whatever you put in it to every visitor for the whole TTL. If a render happens during an API brownout, empty data gets baked in and served as "fast and wrong" until the timer expires. The fix is to retry and validate *before* a value is allowed into the cache, and to keep TTLs short on data that is both flaky and fast-changing.

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
  const raw = document.getElementById('md').textContent;
  marked.setOptions({ gfm:true, breaks:false });
  const content = document.getElementById('content');
  content.innerHTML = marked.parse(raw);
  // build TOC + heading ids
  const toc = document.getElementById('toc');
  const heads = content.querySelectorAll('h2, h3');
  const slug = (t,i)=> 'h'+i+'-'+t.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,40);
  heads.forEach((h,i)=>{
    const id = slug(h.textContent, i); h.id = id;
    const a = document.createElement('a');
    a.href = '#'+id; a.textContent = h.textContent.replace(/^[0-9.]+\s*/, '');
    a.className = h.tagName.toLowerCase();
    toc.appendChild(a);
  });
  // scroll-spy
  const links = [...toc.querySelectorAll('a')];
  const map = new Map(links.map(a=>[a.getAttribute('href').slice(1), a]));
  const obs = new IntersectionObserver((es)=>{
    es.forEach(e=>{ if(e.isIntersecting){ links.forEach(l=>l.classList.remove('active')); const a=map.get(e.target.id); if(a)a.classList.add('active'); }});
  }, { rootMargin:'-10% 0px -80% 0px' });
  heads.forEach(h=>obs.observe(h));
  // back to top
  const top = document.getElementById('top');
  addEventListener('scroll',()=>{ top.classList.toggle('show', scrollY>600); });
</script>
</body>
