## 1. The Big Picture & Mental Model

Before we touch a single line of clever code, you need the **map of the whole territory**. If you understand the map, every later detail has a place to live in your head. If you skip the map, every detail feels like a random fact you have to memorize. This section is the map. By the end you will be able to say, out loud, "when someone types `apex.example.com` and hits Enter, here is exactly what happens, step by step, until pixels appear on their screen." That single sentence is what separates someone who *used* AI to build a site from someone who *understands* the site.

### 1.1 What is a web app, really? (frontend, backend, database)

A **web app** is just a program that runs partly on someone else's computer (a **server**) and partly inside the visitor's web browser (the **client**). That is the whole idea. The hard part is that those two computers are far apart and can only talk by sending messages over the internet.

> 🧠 Analogy: A web app is a restaurant. The **frontend** is the dining room: the tables, menus, lighting, the plated food the customer actually sees and touches. The **backend** is the kitchen: nobody in the dining room sees it, but it does the cooking. The **database** is the walk-in fridge and pantry: it just stores ingredients (data) safely until the kitchen needs them. A customer never walks into the fridge directly; they ask a waiter, the waiter tells the kitchen, the kitchen fetches from the fridge.

Three layers, three jobs:

- **Frontend** (also "client side"): everything that runs in the browser. The HTML (structure), CSS (looks), and JavaScript (interactivity). In this repo that is the React components in `apps/web/components` and `apps/web/app`.
- **Backend** (also "server side"): code that runs on a server, out of the visitor's reach. It fetches data from outside sources, talks to the database, and decides what HTML to send. In this repo the backend lives inside the same Next.js app: the API routes in `apps/web/app/api`, the data-fetching helpers in `apps/web/lib`, and the shared packages `packages/api-client` and `packages/db`.
- **Database**: a permanent, organized store of data. This project uses **PostgreSQL** (a battle-tested relational database), reached through the `packages/db` package.

The single most important truth: **the browser cannot be trusted and cannot do everything.** It has no secret API keys, no direct line to the database. Anything secret or heavy happens on the backend. That one rule explains 80% of why the folders are split the way they are.

### 1.2 What is a framework, and what are React, Next.js, and TypeScript?

A **framework** is a pre-built skeleton for an app that handles the boring, repetitive plumbing (routing, rendering, bundling) so you only write the parts unique to *your* app.

> 🧠 Analogy: Building a web app from scratch is like building a car from raw metal. A framework is buying a chassis, engine, and wheels already bolted together, so you just design the body and interior. You go faster and you make fewer fatal mistakes (like forgetting brakes).

Three core technologies stack on top of each other here:

**React** is a library for building user interfaces out of **components**: small, reusable, self-contained pieces of UI. A `HeroLeadStory` component, a `RaceTickerBar` component. You describe what the UI *should look like* for a given set of data, and React figures out how to update the screen. You can see this in the homepage, which is literally just components snapped together like LEGO:

```tsx
// apps/web/app/page.tsx
import { HeroLeadStory } from '@/components/home/HeroLeadStory';
import { HeroRail } from '@/components/home/HeroRail';
import { RaceBrief } from '@/components/home/RaceBrief';
```

**Next.js** is a *framework built on top of React*. Plain React only runs in the browser and gives you a blank page until JavaScript loads. Next.js adds the missing professional pieces: a **router** (folders become URLs), **server-side rendering** (build the HTML on the server so the page is full of content immediately), API routes (a backend), image optimization, and font handling. The web app declares its dependency on it here:

```jsonc
// apps/web/package.json
"next": "^16.2.9",
"react": "^19.2.7",
"react-dom": "^19.2.7",
```

**TypeScript** is JavaScript with a **type system** bolted on. Plain JavaScript lets you write `driver.naem` (typo) and only explodes at runtime in front of a user. TypeScript catches that mistake *while you type*, before the code ever runs. Every source file here ends in `.ts` or `.tsx`. The project even shares a dictionary of allowed shapes so the whole codebase agrees on what an F1 race or driver looks like:

```ts
// packages/types/src/index.ts
export type SessionKind = 'FP1' | 'FP2' | 'FP3' | 'SQ' | 'S' | 'Q' | 'R';
export type RaceStatus = 'completed' | 'live' | 'upcoming' | 'testing' | 'cancelled';
```

> 🧠 Analogy: TypeScript is the spell-check and grammar-check underline in a word processor. The document still runs without it, but you catch the embarrassing mistakes before you hit "send."

**Why these three?** They are the modern industry-standard stack for content-rich, fast, SEO-friendly sites. **The alternative** to Next.js would be a plain React **single-page app** (SPA) using something like Vite. The gotcha with a pure SPA is that the server sends a near-empty HTML shell and the browser must download and run all the JavaScript before *anything* shows up. That is slow on the first load and terrible for Google's crawler, which often sees a blank page. For a news/results site that lives and dies by search ranking, that is a dealbreaker. Next.js renders real HTML on the server first, so the content is there instantly and Google sees it. That is the whole reason it was chosen.

### 1.3 What is a monorepo, and why Turborepo + pnpm workspaces?

Open the repo root and you do not see one project, you see a *workspace of several projects living together*:

```
F1_Shaurya/
├── apps/
│   └── web/                ← the Next.js website (the deployable app)
└── packages/
    ├── api-client/         ← code that fetches from external F1 / news APIs
    ├── db/                 ← database schema + queries (Drizzle + Postgres)
    ├── types/              ← shared TypeScript type definitions
    └── ui/                 ← shared design tokens + cn() class helper
```

A **monorepo** ("mono" = one, "repo" = repository) means many related projects living in **one Git repository** instead of scattered across many. `apps/` holds things you *deploy* (the website). `packages/` holds shared *libraries* the apps import.

> 🧠 Analogy: A monorepo is one big apartment building, not a street of separate houses. The plumbing, electrical, and elevator (shared `packages/`) serve every apartment (`apps/`). When you upgrade the building's water heater once, every apartment gets hot water. In separate houses you would re-do the same upgrade five times and they would drift out of sync.

The `packages/types` package is the perfect example of *why* this matters. The website, the API client, and the database code all need to agree on what a "race" is. By defining `RaceStatus` once in `packages/types` and importing it everywhere, a change in one place updates everyone. The comment in that file states this intent directly:

```ts
// packages/types/src/index.ts
// Shared types across @apex/web, @apex/admin, @apex/api-client, @apex/ingest.
```

**How does `apps/web` actually use these packages?** Through **pnpm workspaces**. `pnpm` is the **package manager** (the tool that downloads and links code libraries; the alternatives are `npm` and `yarn`). A *workspace* lets one package depend on another *local* package as if it were a published library. Look at how the web app pulls in the internal packages:

```jsonc
// apps/web/package.json
"dependencies": {
  "@apex/api-client": "workspace:*",
  "@apex/db": "workspace:*",
  "@apex/types": "workspace:*",
  "@apex/ui": "workspace:*",
```

`workspace:*` literally means "use the local copy in this repo, whatever version it is at." The workspace boundaries are declared at the root:

```yaml
# pnpm-workspace.yaml
packages:
  - "apps/*"
  - "packages/*"
```

That tells pnpm: "every folder under `apps/` and `packages/` is a member of this workspace." Now `import { db } from '@apex/db'` inside the web app resolves to your own `packages/db/src` folder, no publishing to the internet required.

> 🧠 Analogy: `pnpm` chosen over `npm` is like a shared parking garage vs. every apartment owning a duplicate of every car. pnpm stores one copy of each library on disk and *links* it into each package, instead of copying `node_modules` into every project. It is dramatically faster and uses far less disk space, which is exactly what a multi-package monorepo needs.

**Turborepo** (the `turbo` tool) is the **task runner** that sits on top. Running `pnpm build` at the root would naively rebuild everything every time, even untouched packages. Turborepo is smart: it understands the dependency graph and **caches** results, so it only rebuilds what changed. The root scripts route every command through it:

```jsonc
// package.json (root)
"scripts": {
  "dev": "turbo run dev --parallel",
  "build": "turbo run build",
  "lint": "turbo run lint",
  "typecheck": "turbo run typecheck",
```

And `turbo.json` encodes the *order*. The key line is `"dependsOn": ["^build"]`:

```jsonc
// turbo.json
"tasks": {
  "build": {
    "dependsOn": ["^build"],
    "outputs": [".next/**", "!.next/cache/**", "dist/**"]
  },
```

The `^` means "build my dependencies first." So before `apps/web` builds, Turborepo builds `packages/db`, `packages/types`, etc. The `outputs` line tells Turborepo which files to cache so a second build with no changes is nearly instant.

> 🧠 Analogy: Turborepo is a smart contractor with a memory. If you only repainted the kitchen, it does not re-pour the foundation; it remembers the foundation is fine and skips straight to the kitchen. The `^build` rule is the contractor knowing you cannot install cabinets before the walls exist.

**The gotcha:** the `dependsOn` graph has to be correct. If `packages/db` secretly needs `packages/types` but you never declared `@apex/types` as a dependency in `packages/db/package.json`, Turborepo might build them in the wrong order and the build fails with a confusing "cannot find module" error. Notice this repo *does* declare it correctly:

```jsonc
// packages/db/package.json
"dependencies": {
  "@apex/types": "workspace:*",
  "drizzle-orm": "^0.45.2",
  "postgres": "^3.4.5"
}
```

That single line is what makes the build order safe.

### 1.4 How the folders map to responsibilities

Here is the mental filing cabinet. When you wonder "where does X live?", this table answers it.

| Folder | Layer | Job | Real evidence |
|---|---|---|---|
| `apps/web/app` | Frontend + backend routing | Pages and API routes; folders become URLs | `app/page.tsx` = `/`, `app/drivers` = `/drivers`, `app/api` = backend endpoints |
| `apps/web/components` | Frontend | Reusable React UI pieces | `HeroLeadStory`, `RaceTickerBar`, `MegaNavServer` |
| `apps/web/lib` | Backend (in-app) | Data-fetching + helper logic the pages call | `home-feed.ts`, `cron-auth.ts`, `format.ts` |
| `packages/api-client` | Backend | Talks to outside F1/news APIs and normalizes them | folders like `jolpica`, `openf1`, `newsapi`, `groq`, `aggregator.ts` |
| `packages/db` | Backend / data | Database schema + queries | `schema/`, `queries.ts`, `client.ts` (Drizzle ORM + Postgres) |
| `packages/types` | Shared contract | One source of truth for data shapes | `SessionKind`, `RaceStatus` |
| `packages/ui` | Shared frontend | Design tokens + the `cn()` class merger | `tokens.css`, `tokens.ts`, `cn.ts` |

The deep `api-client` folder is worth a glance because it reveals the project's character: `jolpica`, `openf1`, `newsapi`, `guardian`, `reddit`, `youtube`, `groq` (an LLM), `unsplash`, and an `aggregator.ts` that blends them. This is a site that stitches together many free data sources into one F1 experience, and *every* one of those lives on the backend because they need secret API keys, which is exactly why `turbo.json` lists them as `globalEnv`:

```jsonc
// turbo.json
"globalEnv": [
  "GROQ_API_KEY", "NEWSAPI_KEY", "GUARDIAN_API_KEY",
  "YOUTUBE_API_KEY", "RESEND_API_KEY", "DATABASE_URL", ...
]
```

> 🧠 Analogy: `globalEnv` is the list of which secret keys the kitchen is allowed to use. They are written on a card pinned inside the kitchen, never printed on the customer's menu. If one of these leaked into the frontend, anyone could read your API key from the browser and run up your bill. That is why these names are deliberately *not* prefixed with `NEXT_PUBLIC_` (the prefix that *would* expose them to the browser).

### 1.5 App Router & `layout.tsx`: the frame around every page

Next.js uses the **App Router**: the folder structure inside `apps/web/app` *is* the routing table. A folder named `drivers` automatically becomes the `/drivers` URL. No router config to maintain. The special file `layout.tsx` is the **shared frame** wrapped around every page, the part that never changes as you navigate: the nav bar, ticker, footer.

> 🧠 Analogy: `layout.tsx` is the picture frame and matting; each `page.tsx` is the photo you swap inside it. You change the photo (navigate pages) without rebuilding the frame.

Look at the actual root layout. It defines the `<html>` and `<body>` that every page lives inside, and drops the persistent shell components around a `{children}` slot where each page renders:

```tsx
// apps/web/app/layout.tsx
export default function RootLayout({ children }: { children: React.ReactNode }) {
  return (
    <html lang="en" className={`dark ${fontVars}`}>
      ...
      <body className="antialiased">
        <LenisProvider>
            <TopUtilityBar />
            <MegaNavServer />
            <RaceTickerBar />
            <BreakingNewsTickerServer />
            <main id="main" className="relative">
              {children}
            </main>
            <Footer />
            ...
```

That `{children}` is the photo slot. When you visit `/`, `app/page.tsx` renders into it. When you visit `/drivers`, that page renders into the *same* frame, so the nav and footer never flicker or reload.

This file also shows two professional touches worth naming. First, **fonts are self-hosted** through `next/font` instead of a Google Fonts `<link>`, with a comment explaining exactly why:

```tsx
// apps/web/app/layout.tsx
const anybody = Anybody({
  subsets: ['latin'],
  weight: ['700', '800'],
  variable: '--font-anybody',
  display: 'swap',
});
```

The reason (stated in the file): no Google round-trip, no render-blocking `<link>`, no layout shift. Second, **metadata** (the title, description, social-share cards Google and Twitter read) is declared as a plain exported object, which Next.js turns into `<head>` tags for you:

```tsx
// apps/web/app/layout.tsx
export const metadata: Metadata = {
  title: {
    default: `${SITE} · Independent Formula 1 fan platform`,
    template: `%s · ${SITE}`,
  },
  ...
```

### 1.6 The whole journey: URL typed → pixels on screen

This is the section to truly internalize. Walk it slowly. A user types the site URL and hits Enter. Here is every step.

**Step 1 · DNS lookup (find the address).** The URL is a human name like `apex.example.com`. Computers route by numeric **IP address**. The browser asks the **DNS** (Domain Name System), the internet's phone book, "what IP belongs to this name?" and gets back an address pointing at Vercel's servers.

> 🧠 Analogy: DNS is looking up a contact's name to get their phone number before you can actually call.

**Step 2 · The request reaches Vercel.** **Vercel** is the hosting platform this project deploys to (confirmed by `VERCEL`, `VERCEL_ENV`, `VERCEL_URL` in `turbo.json`'s `globalEnv`, and the `vercel.json` in `apps/web`). Vercel runs the Next.js app on servers near the user (an **edge/CDN network**) so the connection is short and fast.

**Step 3 · Server-side rendering (the kitchen cooks the page).** Because this is Next.js with the App Router, the server runs your page component *on the server* to produce real HTML. For the homepage, the server starts rendering `app/page.tsx` wrapped inside `app/layout.tsx`. The shell (nav, ticker, footer) renders immediately. The page does **not** wait for slow data, because each data-heavy section is wrapped in a **Suspense** boundary:

```tsx
// apps/web/app/page.tsx
import { Suspense } from 'react';
// ...
export const revalidate = 300;
```

That `revalidate = 300` is **Incremental Static Regeneration**: Next.js serves a cached, pre-rendered copy of this page and only rebuilds it every 300 seconds. So most visitors get an instant pre-baked page, and the server only does the heavy fetching occasionally. The file's own comment explains the streaming design:

```tsx
// apps/web/app/page.tsx
/**
 * Each async section streams behind its own Suspense boundary, so the sticky
 * shell + page paint immediately and a slow upstream (Reddit, YouTube, Jolpica)
 * never blocks the rest of the page...
 */
```

**Step 4 · Data fetch (kitchen pulls from fridge and suppliers).** Inside those async sections, the server calls helpers in `apps/web/lib` (like `home-feed.ts`) and the `packages/api-client` modules, which fetch from external APIs (Jolpica F1 data, news APIs, YouTube) and from the Postgres database via `packages/db`. This all happens on the server, where the secret keys live. The browser never sees this happen.

**Step 5 · HTML streams to the browser.** Vercel sends the finished HTML down the wire. Crucially, because of streaming, the shell HTML arrives *first* and the slower sections stream in as they finish. The user sees a styled, populated page almost immediately, with skeleton placeholders (`NewsRailSkeleton`, the `shimmer` div) where slow rails are still loading. No blank white screen, ever.

**Step 6 · The browser paints + downloads JavaScript.** The browser reads the HTML and CSS and paints the page. In parallel, it downloads the React JavaScript bundle Next.js sent alongside.

**Step 7 · Hydration (the page comes alive).** Right now the page is a *photograph*: it looks right but the buttons do not click and animations do not run. **Hydration** is React attaching its event listeners and state to the already-rendered HTML, turning the static photo into a living, interactive app. After hydration, clicking the nav, opening the video modal (`VideoPlayerModal`), and the smooth Lenis scroll (`LenisProvider`) all start working.

> 🧠 Analogy: Server rendering ships a fully decorated showroom car that *looks* perfect. Hydration is turning the key so the engine starts and the steering actually works. The genius is the customer can admire and read the car immediately, while the engine warms up.

**The gotcha that breaks this:** the server and the browser must render *the exact same HTML the first time*, or you get a **hydration mismatch** error and React throws away the server HTML and re-renders from scratch (slow and flickery). This is why you cannot use browser-only things like `window`, `Math.random()`, or `new Date()` directly in a server-rendered component. That single rule, "the first render must match on both sides," is the most common source of confusing bugs in any Next.js app, and knowing it is interview gold.

### Interview ammo

**Q: What is the difference between the frontend, backend, and database in this project?**
The frontend is the React UI in `apps/web/components` and `app/` that runs in the browser. The backend is server-side code: API routes in `app/api`, helpers in `lib/`, and the `api-client` and `db` packages, which hold secrets and fetch data. The database is PostgreSQL, accessed only through `packages/db`. The browser never touches secrets or the database directly; it asks the backend.

**Q: Why Next.js instead of a plain React single-page app?**
Plain React renders only in the browser, so the server ships a near-empty shell and the user (and Google's crawler) stares at a blank page until JavaScript loads. Next.js renders real HTML on the server first, so content and SEO metadata are present instantly, then hydrates for interactivity. For a content and search-driven F1 site, that first-paint and SEO advantage is decisive.

**Q: What is a monorepo and why use Turborepo plus pnpm workspaces here?**
A monorepo keeps several related projects in one Git repo: `apps/web` deploys, `packages/*` are shared libraries. pnpm workspaces let the web app import local packages via `workspace:*` with one shared, disk-efficient `node_modules`. Turborepo runs and caches tasks across packages in the right order using `dependsOn: ["^build"]`, so untouched packages are not rebuilt.

**Q: What does `layout.tsx` do and how does it relate to `page.tsx`?**
`layout.tsx` is the persistent frame wrapped around every route: the `<html>`/`<body>`, fonts, metadata, and the shell (nav, ticker, footer) surrounding a `{children}` slot. Each route's `page.tsx` renders into that slot. Navigating swaps the page without re-rendering the shared shell, so the nav and footer never reload.

**Q: Walk me through what happens when a user loads the homepage.**
DNS resolves the domain to Vercel; Vercel runs the Next.js app near the user. The server renders `page.tsx` inside `layout.tsx`, painting the shell immediately while async sections fetch data behind Suspense boundaries (with `revalidate = 300` serving a cached page most of the time). HTML streams to the browser, which paints it and downloads the React bundle, then hydration attaches interactivity.

**Q: What is hydration and what is a hydration mismatch?**
Hydration is React attaching event handlers and state to the server-rendered HTML, turning a static page into an interactive app. A hydration mismatch happens when the server and the browser produce different HTML on the first render, often from using `window`, `new Date()`, or `Math.random()` in server components; React then discards the server HTML and re-renders, causing flicker and a performance hit.

## 2. The Frontend - How the UI Was Designed & Built

This is the layer you actually see in a browser: the dark cinematic homepage, the sticky glass nav, the crossfading hero. Underneath, it is built from **React components** rendered by **Next.js**, styled with **Tailwind CSS v4**, and animated by a small **motion stack** (Lenis, Framer Motion, GSAP). We will build the whole mental model from zero, then walk the homepage top to bottom.

### 2.1 What a component is (the Lego brick)

A **component** is a reusable, self-contained piece of UI written as a JavaScript function that returns markup. You build a page by snapping components together, the same way you build a spaceship out of Lego bricks instead of carving it from one block of plastic.

> 🧠 Analogy: A component is a Lego brick. `Footer` is one brick, `HeroLeadStory` is another, `MegaNav` is another. The homepage is the finished model. If a brick is chipped, you swap that one brick, you do not rebuild the model.

In this repo every brick is a function whose name starts with a capital letter (React requires the capital so it can tell your custom brick apart from a plain HTML `<div>`). Look at the homepage. It is literally a function that returns a list of other bricks.

`/Users/shauryapunj/Desktop/F1_Shaurya/apps/web/app/page.tsx`
```tsx
export default function HomePage() {
  return (
    <>
      <Suspense fallback={/* ... */}>
        <HeroLeadStory />
      </Suspense>
      <Suspense fallback={/* ... */}>
        <HeroRail />
      </Suspense>
      {/* ...more sections... */}
      <NewsletterCTA />
      <PartnerBar />
    </>
  );
}
```

`<HeroLeadStory />` is you placing the "hero" brick. `<NewsletterCTA />` is the "newsletter" brick. `HomePage` itself is a brick too, just a bigger one made of smaller bricks. **Why this matters in an interview:** components give you reuse (the `link-draw` underline shows up on every footer link without copy-paste), isolation (a bug in `RaceBrief` cannot break `Footer`), and readability (the homepage reads like a table of contents).

The empty tag `<>...</>` is a **Fragment**. React functions must return exactly one thing, but the homepage wants to return many sections side by side. The Fragment is an invisible wrapper that groups them without adding a pointless extra `<div>` to the HTML. Gotcha: forget the wrapper and return two siblings bare, and the build errors with "JSX expressions must have one parent element."

### 2.2 What JSX is (HTML that lives inside JavaScript)

That HTML-looking syntax inside the function is **JSX**. It is not really HTML, it is JavaScript in disguise. A build tool rewrites `<HeroLeadStory />` into a normal function call before the browser ever sees it. JSX exists so that writing UI feels like writing HTML while still having the full power of JavaScript (loops, variables, conditions) right next to it.

You can spot the "this is really JavaScript" seams everywhere. Curly braces `{ }` mean "drop out of HTML mode and run JavaScript here." In the footer, the link columns are generated by looping over an array with `.map()`:

`/Users/shauryapunj/Desktop/F1_Shaurya/apps/web/components/shell/Footer.tsx`

  <div key={g.title}>
    <h4 /* ... */>{g.title.toUpperCase()}</h4>
    <ul className="mt-5 space-y-3">

Five footer columns, each with several links, all produced by data, not by hand-typing five `<div>`s. Two JSX gotchas to memorize: (1) it is `className`, not `class`, because `class` is a reserved word in JavaScript. (2) Every item in a `.map()` needs a unique **`key`** prop (here `key={g.title}` and `key={l.href}`). React uses the key to track which item is which when the list changes. Skip it and React mis-matches rows, causing flicker or wrong data after updates.

### 2.3 Props vs state (the two ways data flows)

A component needs data to render. There are exactly two sources, and knowing which is which is core interview material.

**Props** are data passed *into* a component from its parent, from the outside, read-only. **State** is data a component owns *itself* and can change over time.

> 🧠 Analogy: Props are the ingredients handed to a chef on a plate (the chef cannot change what was handed over, only cook with it). State is the chef's own notepad that they scribble on and erase as the night goes on.

Props in action: the server brick `HeroLeadStory` figures out which stories to show, then *hands them down* to its client child as a prop named `leads`.

### 2.4 The big one: Server Components vs Client Components

This is the single most important concept in this codebase and the most common modern-React interview question. In a Next.js **App Router** project, every component is a **Server Component by default**, and it only becomes a **Client Component** when the file's first line is the magic string `'use client'`.

A **Server Component** runs once, on the server, when the page is built or requested. It can talk directly to databases and APIs, it can hold secrets, and crucially its JavaScript is never shipped to the browser, the user only receives the finished HTML it produced. But it is frozen: it cannot use `useState`, cannot respond to clicks, cannot run timers.

A **Client Component** is the opposite. Its JavaScript *is* shipped to the browser so it can be interactive: `useState`, `onClick`, `useEffect`, timers, scroll listeners. The cost is bundle weight and the fact that it runs in an untrusted place (no secrets).

> 🧠 Analogy: A Server Component is a chef in the kitchen who cooks the dish and sends out a finished plate, the diner never sees the kitchen or the recipe. A Client Component is a fondue set put on the diner's table, they get the raw ingredients and the burner and finish cooking it themselves at the table. Kitchen work is private and cheap to ship (just a plate). Table-side work is interactive but you have to ship the whole burner.

The hero is the textbook split, and it is *deliberately* two files for exactly this reason. `HeroLeadStory` has **no** `'use client'`, so it is a Server Component. It does the private, async, data work:

`/Users/shauryapunj/Desktop/F1_Shaurya/apps/web/components/home/HeroLeadStory.tsx`
```tsx
export async function HeroLeadStory() {
  const items = await getHomeFeed();
  const pool = items.filter((i) => Boolean(i.imageUrl)).slice(0, POOL_SIZE);
  // ...
  return <HeroLeadStoryClient leads={pickRotatingLeads(pool)} />;
}
```

Notice it is `async` and uses `await`. Only Server Components can be `async` functions that fetch data inline like this. It picks the stories on the server, then passes them as plain props to the client half. `HeroLeadStoryClient` starts with the magic string and does all the *interactive* work, the crossfade timer, the pause-on-hover, the pagination dots:

`/Users/shauryapunj/Desktop/F1_Shaurya/apps/web/components/home/HeroLeadStoryClient.tsx`
```tsx
'use client';

import { AnimatePresence, motion } from 'framer-motion';
import { useEffect, useMemo, useState } from 'react';
```

**Why split it instead of making the whole hero a client component?** If the whole hero were `'use client'`, the data-fetching and the API keys would be exposed to the browser, and you would ship more JavaScript. By keeping fetching on the server and only marking the interactive shell as client, you ship the absolute minimum JS and keep secrets server-side. This "server does data, thin client does interaction" pattern repeats across the app: `RaceBrief` (server, calls Groq AI), `MegaNavServer` (server, fetches live previews) wrapping `MegaNav` (client, handles open/close).

A subtle point worth memorizing: a Server Component can *render* a Client Component (the hero does), but a Client Component cannot *import* a Server Component as a child the same way, because once you are on the client, you cannot reach back into the server. The boundary flows one direction, server wraps client.

Gotcha to call out in interviews: the moment you add `useState`, `useEffect`, `onClick`, or `onMouseEnter` to a file, you *must* add `'use client'` or the build fails with "You're importing a component that needs useState. It only works in a Client Component." That is why `RaceBrief.tsx` (no interactivity) has no directive and `MegaNav.tsx` (scroll listeners, dropdowns) does.

### 2.5 `useEffect` (the side-effect escape hatch)

Inside client components you will see **`useEffect`** constantly. It runs code *after* the component has painted, for things that touch the world outside React: timers, event listeners, the browser scroll position. The hero uses it to start and stop the auto-advance timer:

`/Users/shauryapunj/Desktop/F1_Shaurya/apps/web/components/home/HeroLeadStoryClient.tsx`
```tsx
useEffect(() => {
  if (safeLeads.length <= 1 || paused) return;
  const id = window.setInterval(() => {
    setIdx((i) => (i + 1) % safeLeads.length);
  }, CYCLE_MS);
  return () => window.clearInterval(id);
}, [safeLeads.length, paused]);
```

Three things to understand here. The `[safeLeads.length, paused]` at the end is the **dependency array**: "re-run this effect only when one of these changes." The `return () => ...` is the **cleanup function**: React runs it before re-running the effect and when the component disappears, here it clears the interval so you do not stack up dozens of zombie timers. Gotcha: forget the cleanup and you get memory leaks and ghost timers firing after the component is gone. The MegaNav cleans up scroll and keyboard listeners the same disciplined way.

Now the look. Instead of writing separate `.css` files with rules like `.hero-title { font-size: 84px }`, this project uses **Tailwind CSS**: tiny single-purpose class names written directly on the element. `px-4` means padding-left/right `1rem`. `text-7xl` means a big font size. `flex` means display flex. You compose the design out of these atoms right where the markup is.

> 🧠 Analogy: Traditional CSS is choosing a full outfit from a closet named "hero-title-style." Tailwind is a bin of individual clothing items, this shirt, those shoes, that belt, and you assemble each look on the spot. You stop inventing outfit names and stop hunting through a separate closet to see what an outfit contains.

Real example, the hero headline, where you can read the entire visual treatment without leaving the line:

  {current.title}
</h1>

**Why Tailwind over plain CSS or styled-components?** No naming bikeshedding, no dead CSS piling up (the build strips classes you never use), and the styling lives next to the markup so you change one without hunting through another file. The cost is dense-looking class strings, which is the standard critique.

The genius layer here is **design tokens**. Notice `text-on-background` and `text-telemetry-red`, those are not built-in Tailwind colors, they are this project's *own* named colors. They are defined once in the `@theme` block of the global stylesheet:

`/Users/shauryapunj/Desktop/F1_Shaurya/apps/web/app/globals.css`
```css

  --color-background: #141313;
  --color-telemetry-red: #e10600;
  --color-asphalt-gray: #262626;
  /* ... */
  --color-on-background: #e5e2e1;

> 🧠 Analogy: Tokens are the paint cans in your garage with labels like "brand red" and "asphalt gray." Every wall references the can by label. Repaint the can once and every wall that pointed at it updates. Nobody is allowed to invent a random shade mid-job, which is exactly the CLAUDE.md rule "Never invent new top-level hues; extend tokens."

### 2.7 Self-hosted fonts with `next/font`

The fonts are not loaded the lazy way (a `<link>` to Google Fonts). They are pulled in through Next's font helper, which downloads the font at build time and serves it from your own server.

`/Users/shauryapunj/Desktop/F1_Shaurya/apps/web/app/layout.tsx`
```tsx
import { Anybody, Hanken_Grotesk, EB_Garamond, JetBrains_Mono } from 'next/font/google';

const anybody = Anybody({
  subsets: ['latin'],
  weight: ['700', '800'],
  variable: '--font-anybody',
  display: 'swap',
});
```

Each font call returns an object with a `.variable` (a generated CSS-variable class). Those classes get stitched together and attached to the `<html>` tag, which is how the `@theme` line `--font-display: var(--font-anybody), ...` resolves to a real font:

```tsx
const fontVars = `${anybody.variable} ${hankenGrotesk.variable} ${ebGaramond.variable} ${jetbrainsMono.variable}`;
// ...
<html lang="en" className={`dark ${fontVars}`}>
```

**Why self-host instead of the Google `<link>`?** The code comment says it plainly: no round-trip to Google's servers, no render-blocking stylesheet, and no layout shift (the text does not jump when the real font finally arrives). `display: 'swap'` means "show fallback text immediately, swap in the real font when ready," so the page is never blank waiting on fonts. Real-world detail you can quote: the `EB_Garamond` weight is `'400'` with a comment noting Google's version has no 300 face, an honest constraint the dev documented. The one font *still* loaded from Google's CDN is Material Symbols (the icons), because `next/font` cannot handle its variable axes, also documented in the layout `<head>`.

### 2.8 Responsive design (one layout, every screen)

The class string `text-4xl sm:text-5xl md:text-7xl lg:text-[84px]` is **responsive design** in action. The bare `text-4xl` is the phone-first default; each prefix is a **breakpoint** that only kicks in at a wider screen: `sm:` (small), `md:` (medium/tablet), `lg:` (laptop). So the headline is `text-4xl` on a phone and grows to a giant `84px` on a laptop, with no media queries written by hand.

> 🧠 Analogy: Responsive classes are a water bottle that changes size depending on the cup you pour it into. Same content, different vessel.

The whole project is **mobile-first**: the unprefixed class is the smallest screen, and prefixes add overrides upward. You see the same logic in the footer's column grid `grid-cols-2 sm:grid-cols-3 lg:grid-cols-5` (2 columns on a phone, 5 on a laptop) and in the MegaNav, where the desktop link bar is `hidden lg:flex` (invisible until large screens) while the hamburger is `lg:hidden` (visible *until* large screens). One component, two completely different presentations, decided purely by class prefixes.

### 2.9 Suspense and streaming (the page that paints in pieces)

Open the homepage source again and notice nearly every section is wrapped in `<Suspense>`. **Suspense** lets a slow part of the page show a placeholder *now* and swap in the real content *later*, without holding up everything else. Combined with Next's **streaming**, the server sends the page in chunks: the fast shell and skeletons arrive instantly, and each section streams in as its data resolves.

> 🧠 Analogy: A restaurant that brings your drink and bread the moment you sit down instead of making you wait at the door until the entire meal is plated. The slow main course (the Reddit feed) arrives when ready, but you are already seated and snacking.

`/Users/shauryapunj/Desktop/F1_Shaurya/apps/web/app/page.tsx`
```tsx
<Suspense
  fallback={<div className="shimmer h-[88vh] min-h-[640px] w-full" aria-hidden />}
>
  <HeroLeadStory />
</Suspense>

<Suspense fallback={<RailFallback><NewsRailSkeleton count={5} /></RailFallback>}>
  <HeroRail />
</Suspense>

The `fallback` is what shows while the async server component inside is still fetching. The file comment states the goal exactly:

```tsx
/**

 * shell + page paint immediately and a slow upstream (Reddit, YouTube, Jolpica)
 * never blocks the rest of the page.

**Why per-section boundaries instead of one big spinner?** If a single slow API (say YouTube) sat in front of the whole page, the user would stare at a blank screen until the slowest thing finished. With one boundary per rail, a slow rail only blocks *itself*. There is a careful design detail in the `RailFallback` helper: the skeleton is padded to the *same footprint* as the real content so the page does not jump when the real rail streams in. That is preventing **layout shift**, the annoying jump where you go to click something and the page reflows. The hero fallback uses the same trick, `h-[88vh] min-h-[640px]` exactly matches the real hero's height.

### 2.10 ISR and `revalidate` (cached, but not stale forever)

At the top of the homepage:

`/Users/shauryapunj/Desktop/F1_Shaurya/apps/web/app/page.tsx`
```tsx
export const revalidate = 300;
```

This is **ISR (Incremental Static Regeneration)**. The page is rendered once and cached as static HTML (so it serves instantly to everyone), and the `revalidate = 300` says "this cached copy is allowed to be at most 300 seconds (5 minutes) old; after that, regenerate it in the background." Individual data calls can set their own freshness too, like the schedule fetch in `RaceBrief`: `jolpica.getSchedule('current', { revalidate: 3600 })` (1 hour) and the AI brief cached for `86400` (a full day, because an AI call costs money and the brief does not change within a race weekend).

> 🧠 Analogy: A printed newspaper. It is cheap and instant because it was printed once and handed to thousands of readers. But a fresh edition prints on a schedule so the news does not go stale. `revalidate` is how often the press runs.

This ties directly into the hero's rotation logic. Because the page regenerates every 5 minutes, the hero re-slices its story window each time, and the comment in `HeroLeadStory.tsx` spells out that the selection is *deterministic per render* so the server and the browser agree (no **hydration mismatch**, see below). **Why ISR over fetching fresh on every request?** Fresh-every-time means every visitor pays the full API-fetch latency and you hammer the upstream APIs; ISR serves a cached page in milliseconds and refreshes quietly in the background. The gotcha is staleness tuning: set `revalidate` too high and live race data feels dead; too low and you lose the caching benefit and re-bill the APIs.

A related trap this code defends against is **hydration mismatch**. "Hydration" is when the browser takes the server's HTML and re-attaches the interactive JavaScript on top. If the server rendered one thing and the client computes a different thing, React throws an error. Two real defenses: the footer captures the year once at module load (`const COPYRIGHT_YEAR = new Date().getFullYear();`) with a comment explaining the old inline `new Date()` diverged across the New Year boundary; and the hero pins its timestamp to UTC plus `suppressHydrationWarning` so server and client render the identical string.

### 2.11 The motion stack (Lenis, Framer Motion, GSAP)

Three libraries give the site its "expensive" feel, each with a different job.

**Lenis** is **smooth scrolling**. Native browser scroll is steppy; Lenis intercepts the wheel and glides the page with inertia, the Apple/Framer feel. It wraps the entire app in the layout. Note it is a Client Component (`'use client'`), because scrolling is a browser-only, interactive concern:

`/Users/shauryapunj/Desktop/F1_Shaurya/apps/web/components/motion/LenisProvider.tsx`
```tsx
'use client';
import Lenis from 'lenis';

export function LenisProvider({ children }: { children: ReactNode }) {
  useEffect(() => {
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduce) return;

    const lenis = new Lenis({ duration: 1.2, /* ... */ });
    // ...
    const raf = (time: number) => {
      lenis.raf(time);
      rafId = requestAnimationFrame(raf);
    };
    rafId = requestAnimationFrame(raf);
    return () => { cancelAnimationFrame(rafId); lenis.destroy(); /* ... */ };
  }, []);
  return <>{children}</>;
}
```

Two things to notice. It checks `prefers-reduced-motion` and *bails out entirely* if the user's OS asks for less motion, an accessibility must (the CSS file honors the same preference in a `@media (prefers-reduced-motion: reduce)` block). And it drives itself with `requestAnimationFrame`, the browser's "call me right before the next repaint" loop, which is the correct way to run animation at the screen's refresh rate. The `useEffect` cleanup cancels the loop and destroys Lenis when unmounted so nothing leaks.

**Framer Motion** (imported as `motion`) is **component animation**: you swap a normal `<div>` for `<motion.div>` and describe states declaratively. The hero crossfade is pure Framer:

`/Users/shauryapunj/Desktop/F1_Shaurya/apps/web/components/home/HeroLeadStoryClient.tsx`
```tsx
<motion.img
  key={`hero-img-${idx}`}
  initial={{ opacity: 0, scale: 1.04 }}
  animate={{ opacity: 1, scale: 1 }}
  exit={{ opacity: 0, scale: 1.01 }}
  transition={{ /* ... */ }}
/>
```

`initial` is how it starts, `animate` is the resting state, `exit` is how it leaves, and `<AnimatePresence>` (wrapping it) is what makes the *exit* animation possible by keeping the old image mounted long enough to fade out. The slow `scale` 1.04 → 1 is the **Ken Burns** zoom. The footer uses Framer's `whileInView` to animate words up as you scroll them into view (`viewport={{ once: true }}` means do it once, do not re-trigger). The MegaNav uses Framer's `layoutId="apex-nav-dot"` so the red active-section dot *physically slides* between nav items instead of teleporting.

**GSAP** (referenced in `LenisProvider`'s comment, "GSAP ScrollTrigger reads Lenis' scroll events through the proxy registered in useGsap") is the heavy-duty **scroll-driven timeline** tool used elsewhere in the app for pinned/scrubbed sequences. The division of labor to remember: Lenis owns the scroll *feel*, Framer owns *component* enter/exit/hover animation, GSAP owns complex *scroll-position-linked* choreography. They cooperate, GSAP reads its scroll position *from* Lenis rather than from the native scrollbar, so smoothness and scroll-triggers stay in sync. Gotcha: animate only `transform` and `opacity` (which the GPU handles cheaply), which is exactly why you see `scale`, `opacity`, and `translate3d` everywhere and never animated `width`/`top` (which force expensive layout recalcs). The CSS marquee comment ("GPU-only properties") and the tower-flash keyframes follow the same rule.

### 2.12 How the homepage is assembled, section by section

Putting it together. The **layout** (`app/layout.tsx`) is the frame every page lives inside: it sets `<html lang="en" class="dark">`, wires the fonts and metadata, wraps everything in `LenisProvider`, and stacks the persistent shell, `TopUtilityBar`, `MegaNavServer`, `RaceTickerBar`, `BreakingNewsTickerServer`, then `{children}` (the actual page), then `Footer`. The skip-to-content link and `themeColor` viewport are accessibility/polish touches in that same frame.

The `{children}` for the homepage is `app/page.tsx`, which renders in this exact order: **HeroLeadStory** (the crossfading lead, server-picked + client-animated) → **HeroRail** (a strip of more wire stories) → **RaceBrief** (the AI-written 3-sentence "what to watch," server-only, Groq-generated, day-cached) → **QuickLinks** (static, no Suspense, renders inline) → **FeaturedVideoRail** → **EditorsPicks** → **StandingsPreview** → **HighlightsRail** → **SocialPulse** → **NewsletterCTA** → **PartnerBar**. The dynamic, slow ones each sit behind their own `<Suspense>` with a matched-height skeleton; the static ones (`QuickLinks`, `NewsletterCTA`, `PartnerBar`) render immediately with no boundary because they have no data to wait on. The page comment confirms the hero, wire rail, and Editors' Picks all share *one* cached RSS fetch (`lib/home-feed`), so adding sections does not multiply API calls. The page closes at the `Footer`, the big editorial sign-off brick with its 5 link columns, animated hero words, legal disclaimer, and creator credit.

That is the whole frontend story: server bricks fetch data and stay private, thin client bricks add interactivity, Tailwind tokens enforce one consistent look, Suspense streams the page in painted pieces, ISR keeps it fast and reasonably fresh, and the motion trio makes it feel like a product instead of a document.

### Interview ammo

**Q: What is the difference between a Server Component and a Client Component, and how does Next decide?**
Server Components run on the server, can be `async` and fetch data directly, keep secrets safe, and ship zero JavaScript to the browser, but they cannot use state or events. Client Components ship their JS so they can be interactive (`useState`, `onClick`, effects). In the App Router everything is a Server Component by default; you opt into client with `'use client'` at the top of the file. The hero is split into both: `HeroLeadStory` (server, fetches) hands props to `HeroLeadStoryClient` (client, animates).

**Q: Why is the homepage wrapped in so many separate Suspense boundaries?**
So each slow async section streams independently and a single slow upstream (Reddit, YouTube, Jolpica) cannot block the rest of the page. The shell and skeletons paint instantly, then each rail swaps in when its data resolves. The skeletons are deliberately sized to match the real content's footprint to prevent layout shift.

**Q: What does `export const revalidate = 300` do?**
It enables ISR: the page is cached as static HTML for instant delivery and regenerated in the background at most every 300 seconds. It gives near-static speed with near-live freshness, instead of paying full fetch latency on every request or hammering the upstream APIs. Individual fetches can set their own `revalidate` too, like the AI race brief cached for a full day to avoid re-billing.

**Q: How does the design-token / Tailwind v4 system work here?**
Colors, fonts, spacing, and easings are declared once as CSS variables inside the `@theme` block in `globals.css`. Tailwind v4 auto-generates utilities from them, so `--color-telemetry-red` produces `text-telemetry-red`, `bg-telemetry-red`, etc. This gives one source of truth for the whole design. The gotcha is that Tailwind only keeps class names it sees as complete literal strings, so runtime-built classes like `` `grid-cols-${n}` `` get purged and must come from a static lookup array.

**Q: Why self-host fonts with `next/font` instead of a Google Fonts `<link>`?**
`next/font` downloads and serves the fonts from your own origin, removing the Google round-trip and the render-blocking stylesheet, and `display: 'swap'` plus consistent sizing avoids the layout shift you get when a late font swaps in. Each font exposes a CSS variable that the `@theme` font tokens reference. Only Material Symbols still loads from Google's CDN because `next/font` cannot handle its variable axes.

**Q: What is hydration and how does this codebase avoid mismatches?**
Hydration is the browser re-attaching interactive JS onto the server-rendered HTML; if the server and client render different output, React errors. The app prevents this by making time-sensitive values deterministic: the footer captures the copyright year once at module load, the hero pins its timestamp to UTC and uses `suppressHydrationWarning`, and the hero's story selection is computed once on the server and passed as fixed props so the client never recomputes a different set.
