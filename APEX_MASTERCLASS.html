## 5. Advanced Features — Real-time, AI & Email

This is the part of Apex that makes interviewers lean forward. Anyone can render a list of races. The hard, impressive stuff is: a **live data feed that pushes updates to the browser**, a **track map drawn from real GPS telemetry math**, an **AI model that writes scouting reports grounded in real facts**, **transactional email that actually lands in inboxes**, and a **prediction game with anonymous identity and a leaderboard**. We will take each one from absolute zero.

### 5.1 Real-time with Server-Sent Events (SSE): push vs pull

Normally the web works on a **pull** model, also called **request/response**. The browser asks ("GET me this page"), the server answers once, and the connection closes. If you want fresh data, you have to ask again. That is fine for a blog. It is terrible for a live race where positions change every two seconds.

> 🧠 Analogy: Pull is texting your friend "score?" over and over. Push is your friend calling you and just leaving the line open, talking whenever something happens. SSE is the open phone line.

There are three ways to get fresher data:

1. **Polling**: the browser re-asks every few seconds. Wasteful, laggy, and hammers the server.
2. **WebSockets**: a permanent two-way pipe. Powerful, but heavy. Both sides can talk, which you do not need here, and it needs special server and proxy support.
3. **Server-Sent Events (SSE)**: a one-way pipe where the **server pushes** text frames down a single long-lived HTTP response, and the browser listens. Lighter than WebSockets, and it rides on plain HTTP.

Apex chose SSE, and the file literally documents why, which is exactly the kind of reasoning an interviewer wants to hear.

`apps/web/app/api/live/stream/route.ts`
```ts
/**
 * Why SSE and not WebSockets:
 *   - One-way push (server -> client) · we never receive from the browser.
 *   - Works through every CDN + reverse proxy without special config.
 *   - Auto-reconnect built into EventSource. Free retry with backoff.
 *   - Vercel Node runtime supports streaming responses out of the box.
 */
```

The single most important idea: SSE is just a normal HTTP response that **never finishes**. Instead of sending a complete body and closing, the server keeps the connection open and dribbles out text in a specific format. The format is dead simple, just `event:` and `data:` lines separated by a blank line.

`apps/web/app/api/live/stream/route.ts`
```ts
function sseFrame(event: string, data: unknown): Uint8Array {
  const payload = `event: ${event}\ndata: ${JSON.stringify(data)}\n\n`;
  return new TextEncoder().encode(payload);
}
```

That `\n\n` (blank line) at the end is the frame delimiter. The browser's built-in `EventSource` object parses this automatically and fires a JavaScript event named whatever you put after `event:`. The `TextEncoder` turns the string into raw bytes (`Uint8Array`) because the stream deals in bytes, not strings.

**The three magic response headers** are what actually make streaming work:

`apps/web/app/api/live/stream/route.ts`
```ts
return new Response(stream, {
  headers: {
    'Content-Type': 'text/event-stream; charset=utf-8',
    'Cache-Control': 'no-cache, no-store, no-transform',
    Connection: 'keep-alive',
    'X-Accel-Buffering': 'no', // disable nginx buffering for any reverse proxy
  },
});
```

- `text/event-stream` is the MIME type that tells the browser "this is SSE, parse it frame by frame."
- `no-cache, no-store, no-transform` stops any CDN from caching the stream (a cached live feed is frozen and useless).
- `X-Accel-Buffering: no` is the **gotcha that breaks people for days**. Reverse proxies like nginx buffer responses by default, meaning they hold your bytes and release them in chunks. For a normal page that is an optimization. For SSE it means your "2-second" updates arrive in a clump after 30 seconds. This header disables that buffering.

**How does the server hold the connection open?** With a `ReadableStream`. Think of it as a faucet the server controls: it can `enqueue` (push out) bytes whenever it wants, and the response stays open until it calls `close`.

`apps/web/app/api/live/stream/route.ts`
```ts
const stream = new ReadableStream<Uint8Array>({
  async start(controller) {
    let alive = true;
    const emit = (event: string, data: unknown) => {
      if (!alive) return;
      try {
        controller.enqueue(sseFrame(event, data));
      } catch {
        alive = false;
      }
    };
    emit('connected', { ts: Date.now(), source: 'openf1' });
    // ... loop ...
```

The `while (alive)` loop is the heartbeat. When a race is live it pulls four data streams in parallel and pushes a `tower` (the leaderboard), `race_control` (flags, penalties), and `weather` frame, then sleeps two seconds:

`apps/web/app/api/live/stream/route.ts`
```ts
const [intervalsRaw, positionsRaw, rcRaw, weatherRaw] = await Promise.all([
  openf1.getIntervals(session.session_key, { revalidate: 0 }).catch(() => []),
  openf1.getPositions(session.session_key, { revalidate: 0 }).catch(() => []),
  openf1.getRaceControl(session.session_key, { revalidate: 0 }).catch(() => []),
  openf1.getWeather(session.session_key, { revalidate: 0 }).catch(() => []),
]);
// ...
await sleep(TICK_MS_LIVE, abort);
```

Three things here are senior-level moves you should be able to defend:

1. **`Promise.all` with `.catch(() => [])` on each call.** All four fetches happen at once instead of one after another (faster), and if one upstream call dies it falls back to an empty array instead of crashing the whole tick. One bad data source cannot kill the live feed.
2. **Cost discipline.** When there is no live session, it does not poll the expensive endpoints at all. It just sends a `heartbeat` every 30 seconds to keep the pipe warm. `TICK_MS_LIVE = 2_000` caps the rate at 0.5 Hz so the free OpenF1 API is never abused.
3. **Clean teardown.** This is the gotcha that causes memory leaks and runaway bills. When the user navigates away, the browser kills the connection, which fires an **abort signal**. The code listens for it and stops the loop:

`apps/web/app/api/live/stream/route.ts`
```ts
const abort = req.signal;
// ...
abort.addEventListener('abort', close);
```

And the custom `sleep` is abort-aware, so it does not keep ticking for a viewer who already left:

`apps/web/app/api/live/stream/route.ts`
```ts
async function sleep(ms: number, signal: AbortSignal): Promise<void> {
  return new Promise((resolve) => {
    if (signal.aborted) return resolve();
    const t = setTimeout(resolve, ms);
    signal.addEventListener('abort', () => {
      clearTimeout(t);
      resolve();
    }, { once: true });
  });
}
```

Without this, every closed browser tab would leave a `while` loop burning server time forever. **That is the difference between a demo and production.**

Finally, two route configs matter:

`apps/web/app/api/live/stream/route.ts`
```ts
export const runtime = 'nodejs';
export const dynamic = 'force-dynamic';
export const maxDuration = 300; // Vercel pro cap; hobby cap is 60.
```

`dynamic = 'force-dynamic'` tells Next.js "never try to cache or pre-render this, it is live." `maxDuration` is the wall-clock budget before the platform kills your function; on Vercel's free Hobby tier that is 60 seconds, which is the real-world limit a live SSE feed will hit (the browser's `EventSource` then auto-reconnects, which is exactly why the auto-reconnect property of SSE matters).

### 5.2 The telemetry track map: turning GPS numbers into a drawn circuit

The `TrackMap` component draws a real Formula 1 circuit's shape, not a stock SVG, from **car GPS telemetry**. Telemetry is just the stream of measurements a car broadcasts: speed, throttle, and crucially **x/y position** on the track surface, sampled many times per second. If you record one driver's x/y points for one full lap and connect the dots, you have literally traced the track.

> 🧠 Analogy: Imagine a car with a dripping paint can doing one lap. The trail of dots on the tarmac is the track outline. The track map takes the GPS "drips" and redraws them on screen.

**Step 1: grab a clean lap.** The code asks OpenF1 for one reference driver's position over a 95-second window, taken 20 minutes into the session so it is settled green-flag running, not a chaotic start.

`apps/web/components/live/TrackMap.tsx`
```ts
const outlineGte = new Date(start + 20 * 60_000).toISOString();
const outlineLte = new Date(start + 20 * 60_000 + 95_000).toISOString();
```

**Step 2: the core problem.** GPS x/y are real-world coordinates, weird numbers like `x: 4521, y: -1893` in some local metric grid. An SVG canvas wants numbers inside a fixed box, here `0` to `1000`. So you must **normalize**: squeeze the real-world coordinate range into the 0 to 1000 box, keeping the shape's proportions and centering it. This is the math an interviewer will probe.

First, find the bounding box of all points (the smallest rectangle that contains the whole track):

`apps/web/components/live/TrackMap.tsx`
```ts
const minX = Math.min(...xs);
const maxX = Math.max(...xs);
const minY = Math.min(...ys);
const maxY = Math.max(...ys);
const w = maxX - minX || 1;
const h = maxY - minY || 1;
const SIZE = 1000;
const PAD = 80;
const scale = Math.min((SIZE - PAD * 2) / w, (SIZE - PAD * 2) / h);
```

The `scale` is the shrink/grow factor. We compute how much we would need to scale to fit the width, and to fit the height, and take the **smaller of the two** (`Math.min`). Taking the smaller one guarantees the whole track fits inside the box without overflowing on either axis, and the `|| 1` guards against dividing by zero if every point were identical. `PAD = 80` leaves an 80-unit margin so the track does not touch the edges.

Then we center it by computing offsets, and build two transform functions:

`apps/web/components/live/TrackMap.tsx`
```ts
const offX = (SIZE - w * scale) / 2;
const offY = (SIZE - h * scale) / 2;
const tx = (x: number) => offX + (x - minX) * scale;
const ty = (y: number) => SIZE - (offY + (y - minY) * scale);
```

Read `tx` slowly: `(x - minX)` shifts the coordinate so the leftmost point becomes 0, `* scale` shrinks it to fit, `+ offX` nudges it to center. Standard normalization.

**The Y-axis flip is the gotcha.** Look at `ty`: it wraps everything in `SIZE - (...)`. In the real world (and in math class) the y-axis points up, bigger y means higher. In SVG and almost all screen graphics, **y points down**, where 0 is the top and 1000 is the bottom. If you skip the flip, your track renders upside-down. `SIZE - value` mirrors it so up stays up.

**Step 3: the outline is just a polyline.** A polyline is "connect these points with straight lines." There is no curve magic. When the points are close enough together, a sequence of tiny straight segments looks like a smooth curve. The code converts each point to a `"x,y"` string and joins them:

`apps/web/components/live/TrackMap.tsx`
```ts
const step = Math.max(1, Math.floor(outline.length / 240));
const poly = outline
  .filter((_, i) => i % step === 0)
  .map((p) => `${tx(p.x).toFixed(1)},${ty(p.y).toFixed(1)}`)
  .join(' ');
```

The `step` downsamples to roughly 240 points. Too many points is a slow, bloated SVG; 240 is enough for a smooth-looking lap. `.toFixed(1)` trims decimals to keep the markup small.

The track is drawn as **two overlapping polylines**: a thick dark "asphalt" line under a thin red "racing line," a cheap trick that reads as a real track ribbon:

`apps/web/components/live/TrackMap.tsx`
```tsx
<polyline points={poly} fill="none" stroke="#2b2b2b" strokeWidth={14} ... />
<polyline points={poly} fill="none" stroke="#e10600" strokeWidth={2.5} opacity={0.55} ... />
```

The car dots reuse the **same `tx`/`ty` functions**, which is why they land exactly on the track. Each car's latest position is plotted as a colored circle (team color) with its three-letter acronym above it:

`apps/web/components/live/TrackMap.tsx`
```tsx
<circle cx={tx(pt.x)} cy={ty(pt.y)} r={11} fill={teamColor.get(num) ?? '#888'} ... />
<text x={tx(pt.x)} y={ty(pt.y) - 17} ...>{acro.get(num) ?? num}</text>
```

**A real-world data gotcha worth quoting in an interview:** GPS telemetry stops recording slightly before the official session end time. So if you naively query "the last few seconds of the session" for a finished race, you get nothing. The author found this and hardcoded a known-good in-session snapshot for completed sessions:

`apps/web/components/live/TrackMap.tsx`
```ts
// Dots: live = last few seconds (recent positions). Past = a known-good
// in-session 3s snapshot (~21 min in), because GPS telemetry stops before the
// official date_end, so an end-of-session window comes back empty.
const dotsGte = isLive
  ? new Date(Date.now() - 6000).toISOString()
  : new Date(start + 21 * 60_000).toISOString();
```

And a defensive guard so a junk session never renders a broken scribble: if fewer than 20 outline points came back, render nothing at all (`if (outline.length < 20) return null;`).

### 5.3 The AI dossier: what an LLM API is, prompt design, grounding, and caching the bill away

An **LLM (Large Language Model)** is a text-prediction engine trained on huge amounts of writing. You hand it some text (a **prompt**), it returns plausible continuation text. An **LLM API** is just an HTTP endpoint you POST your prompt to and get text back. Apex uses **Groq**, a provider that runs open Llama models very fast, on its free tier.

> 🧠 Analogy: The LLM is a brilliant but overconfident intern who will write you a beautiful paragraph about anything, including things they are not sure about. Your job is to give them only the true facts and strict rules, so they cannot make things up.

**The API call itself** is one `fetch` to an OpenAI-compatible endpoint. Note it returns `null` on any failure rather than throwing, which is a deliberate "AI is optional, never crash the page" rule:

`packages/api-client/src/groq/client.ts`
```ts
const BASE = 'https://api.groq.com/openai/v1/chat/completions';
export const GROQ_MODEL_QUALITY = 'llama-3.3-70b-versatile';
// ...
const apiKey = process.env['GROQ_API_KEY'];
if (!apiKey) return null;
```

The request body shows the three knobs every LLM call has:

`packages/api-client/src/groq/client.ts`
```ts
const body = JSON.stringify({
  model: opts.model ?? GROQ_MODEL_QUALITY,
  messages,
  temperature: opts.temperature ?? 0.6,
  max_tokens: opts.maxTokens ?? 320,
  stream: false,
});
```

- **`model`**: which brain to use. Apex defines two, a smart 70B model for prose quality and a fast 8B model for cheap high-volume work. Picking the right model per job is a real engineering decision.
- **`temperature`**: the creativity dial, 0 means deterministic and repetitive, 1 means wilder. The dossiers use `0.5` (factual and tight); the race brief uses `0.6` (a touch more flair).
- **`max_tokens`**: a hard cap on output length. A **token** is roughly 3/4 of a word. Capping it limits cost and keeps the answer short.

**Resilience: retry with exponential backoff.** Rate-limit (429) and server (5xx) errors are usually temporary, so the client retries with a doubling delay before giving up:

`packages/api-client/src/groq/client.ts`
```ts
if (res.status === 429 || res.status >= 500) {
  if (attempt < MAX_RETRIES) {
    await sleep(500 * 2 ** attempt);  // 500ms, then 1000ms
    continue;
  }
  return null;
}
```

`2 ** attempt` doubles the wait each round (this is **exponential backoff**). Hammering a rate-limited server instantly just gets you blocked harder; backing off gives it room to recover.

**Prompt design and grounding** are the heart of it. A **system prompt** sets the persona and the rules; the **user message** carries the data. Apex's dossier system prompt is a masterclass in defensive prompting:

`packages/api-client/src/groq/index.ts`
```ts
content:
  'You are Apex, an elite Formula 1 analyst. Write a punchy, factual 2-sentence scouting dossier ' +
  'for the given driver. Voice: sharp, modern, telemetry-grade · never flowery, never a Wikipedia ' +
  'rehash. The Background is AUTHORITATIVE for career achievements; the numeric stats may be ' +
  'incomplete, so if they conflict with the Background, trust the Background and NEVER understate ' +
  'a driver (e.g. do not call a race-winner or champion winless). Use only the supplied facts; ' +
  'never invent specifics. CRITICAL STYLE RULE: never use em dashes or en dashes anywhere; ...',
```

**Grounding** means giving the model the real facts so it does not hallucinate (make up false statements). Instead of asking "tell me about Lewis Hamilton" (which invites invention), the code assembles a fact sheet from real career numbers plus a Wikipedia extract, and orders the model to use **only** those facts:

`packages/api-client/src/groq/index.ts`
```ts
const facts = [
  `Name: ${input.name}`,
  `Nationality: ${input.nationality}`,
  input.team ? `Current/last team: ${input.team}` : '',
  input.wins > 0 ? `Race wins (at least): ${input.wins}` : '',
  // ...
  input.context ? `Background: ${input.context}` : '',
].filter(Boolean).join('\n');
```

Notice `input.wins > 0` only surfaces a win count when it is positive. The upstream data can be incomplete, and a misleading "0 wins" for a champion is worse than saying nothing, so the prompt also instructs the model to **trust the Background over the numbers** when they conflict. This is the kind of real-world data-quality judgment that separates a thoughtful AI integration from a toy one.

**Caching the AI output so you never pay twice** is the most important production detail. An LLM call costs money and time on every invocation. A driver's dossier does not change every minute, so it would be wasteful to regenerate it on every page view. The fix is Next.js's `unstable_cache`, which memoizes the result on the server, keyed by an identifier, for a set time.

`apps/web/app/drivers/[slug]/page.tsx`
```ts
const dossier = await unstable_cache(
  () =>
    generateDriverDossier({ name: d.fullName, /* ...real facts... */ }),
  ['driver-dossier-v4', slug],
  { revalidate: 86400 },
)();
```

Read the three arguments: the **function** to run, the **cache key** (`['driver-dossier-v4', slug]`, so each driver caches separately and bumping `v4` busts all old caches), and **options** where `revalidate: 86400` means "reuse this for 24 hours, then regenerate." The comment spells out the payoff: roughly 25 drivers means about 25 LLM calls per day total, not one per visitor. **This is the difference between a $5 hobby project and a $5,000 surprise bill.**

The gotcha hidden in the client comment: Next.js does **not** automatically cache POST requests, and LLM calls are POSTs. So the `revalidate` option on the fetch itself does nothing for token reuse; you **must** wrap the call in `unstable_cache` as the page does:

`packages/api-client/src/groq/client.ts`
```ts
* NOTE: Next does not data-cache POST, so for
* real token reuse callers should ALSO wrap the call in `unstable_cache` keyed
* by the input.
```

### 5.4 Email deliverability: why "just send an email" is a lie

Sending email that **arrives** is shockingly hard. The internet assumes any server can claim to send mail from any address, which spammers abused for decades. So inboxes now demand cryptographic proof that you are allowed to send from a domain. Apex uses **Resend**, an email API that handles the sending, but you still have to set up domain records or your mail bounces.

> 🧠 Analogy: Sending email is like mailing a letter signed "From: the King." Anyone can write that. SPF, DKIM, and DMARC are the wax seal, the signature, and the royal decree that let the post office verify the King actually sent it, and trash it if not.

The four DNS records, in plain English:

- **MX (Mail Exchange)**: points to the server that **receives** mail for your domain. The "where do letters to you go" record.
- **SPF (Sender Policy Framework)**: a public list of which servers are **allowed to send** mail claiming to be from your domain. The receiving inbox checks: "did this come from an approved server?"
- **DKIM (DomainKeys Identified Mail)**: a **cryptographic signature** on each message. Your sending service signs with a private key; the matching public key sits in your DNS. The inbox verifies the signature, proving the message is genuinely yours and was not tampered with in transit.
- **DMARC (Domain-based Message Authentication, Reporting & Conformance)**: the **policy** that ties SPF and DKIM together and tells inboxes what to do if a message fails both ("reject it," "send it to spam," or "let it through but report"). Without DMARC, the other two are just suggestions.

The Apex code respects this reality. The newsletter route adds contacts to a Resend audience the moment the keys exist, but the **welcome email stays dormant** until a verified sending domain is configured, because Resend will not deliver from its sandbox sender to arbitrary inboxes:

`apps/web/app/api/newsletter/route.ts`
```ts
async function sendWelcomeEmail(email: string, apiKey: string): Promise<void> {
  const from = process.env.RESEND_FROM_EMAIL;
  if (!from) return;   // dormant until a verified domain sender exists
  // ...
```

The comment states the exact constraint, and naming the verified domain is precisely what an interviewer wants to see you understand:

`apps/web/app/api/newsletter/route.ts`
```ts
/**
 * Welcome email on signup. Dormant until RESEND_FROM_EMAIL is set on a verified
 * domain (mail.shauryapunj.com) · Resend will not deliver to arbitrary inboxes
 * from the resend.dev sandbox sender. Never throws; signup succeeds either way.
 */
```

Two more production-grade touches in this route. First, **graceful degradation**: if the Resend keys are missing, it does not error, it logs the capture and returns `202 Accepted` so the signup UX never breaks in dev:

`apps/web/app/api/newsletter/route.ts`
```ts
if (!RESEND_API_KEY || !RESEND_AUDIENCE_ID) {
  console.warn(`[newsletter] capture queued locally: ${email} · set ...`);
  return NextResponse.json({ ok: true, mode: 'local-queue', ... }, { status: 202 });
}
```

Second, **treating a duplicate as success**. If someone signs up twice, Resend returns a 409 conflict; the code maps that to a friendly "thanks" instead of an ugly error, because re-subscribing is not a user-facing failure:

`apps/web/app/api/newsletter/route.ts`
```ts
if (r.status === 409) {
  return NextResponse.json({ ok: true, mode: 'resend', duplicate: true });
}
```

The gotcha: never let your email side-effect crash the main flow. `sendWelcomeEmail` swallows its own errors (`catch { /* non-fatal */ }`), and the comment promises "signup succeeds either way." Email is a best-effort extra, not a blocker.

### 5.5 The predict game: pure scoring, anonymous cookie identity, and the leaderboard

The Grid Predict feature lets a fan call four outcomes (pole, winner, podium, fastest lap), then **auto-scores** them against the real result and ranks everyone on a leaderboard, with **no signup**. Three ideas power it.

**Idea 1: scoring is a pure function.** `scorePicks` takes the fan's picks plus the real race and qualifying results, and returns a score. "Pure" means it has no side effects and no hidden state, the same inputs always give the same output, which makes it trivial to test and reason about.

`apps/web/lib/predict.ts`
```ts
export const PREDICT_QUESTIONS = [
  { id: 'pole', label: 'Pole position', points: 3 },
  { id: 'winner', label: 'Race winner', points: 5 },
  { id: 'podium', label: 'Podium finish (top 3)', points: 3 },
  { id: 'fastest_lap', label: 'Fastest lap', points: 2 },
] as const;
```

It extracts the real answers from the official classification, then checks each pick. Note `podium` is special: it is correct if your driver finished anywhere in the top three, so it uses `includes` rather than an exact match:

`apps/web/lib/predict.ts`
```ts
const podiumIds = results
  .filter((r) => Number(r.position) >= 1 && Number(r.position) <= 3)
  .map((r) => r.Driver.driverId);
// ...
podium: { ok: (p) => podiumIds.includes(p), actual: podiumIds[2] ?? null },
```

The `as const` on the questions array is a TypeScript trick: it freezes the literal values so `PredictQId` becomes the exact union `'pole' | 'winner' | 'podium' | 'fastest_lap'`, and a typo in a question id becomes a compile error.

**Idea 2: anonymous identity via an httpOnly cookie.** How do you have a leaderboard without accounts? You mint a random ID (a **UUID**, a long unique string) the first time someone saves picks, store it in a cookie, and treat that cookie as their identity forever after.

`apps/web/app/api/predict/route.ts`
```ts
const jar = await cookies();
const pid = jar.get('apex_pid')?.value ?? randomUUID();
// ... save the prediction keyed by pid ...
const res = NextResponse.json({ ok });
res.cookies.set('apex_pid', pid, {
  httpOnly: true,
  sameSite: 'lax',
  secure: true,
  maxAge: 60 * 60 * 24 * 365,
  path: '/',
});
```

Read it: "get the existing `apex_pid` cookie, or if there is none, generate a fresh UUID," then write that ID back as a cookie. The cookie flags each guard something:

- **`httpOnly`**: JavaScript in the browser cannot read it, which blocks theft via XSS.
- **`secure`**: only sent over HTTPS.
- **`sameSite: 'lax'`**: not sent on cross-site requests, a CSRF guard.
- **`maxAge`**: one year, so the identity persists across visits.

The gotcha to be honest about in an interview: this is **per-browser**, not per-person. Clear cookies or switch devices and you are a new player. That is a deliberate, acceptable tradeoff for a frictionless "no signup" game.

The input is also sanitized before it touches the database, only known question keys with string values get through, and each is length-capped, so a malicious client cannot stuff junk into storage:

`apps/web/app/api/predict/route.ts`
```ts
const clean: Record<string, string> = {};
for (const [k, v] of Object.entries(picks)) {
  if (VALID_IDS.has(k as never) && typeof v === 'string' && v) clean[k] = v.slice(0, 64);
}
```

**Idea 3: lazy auto-scoring on page render.** There is no cron job grading predictions. Instead, when anyone loads the predict page after a race, the page checks for unscored predictions and grades them in bulk, once:

`apps/web/app/predict/page.tsx`
```ts
const preds = await getRacePredictions(lastDone.season, lastDone.round);
const unscored = preds.filter((p) => p.score === null);
if (unscored.length > 0) {
  await setPredictionScores(
    unscored.map((p) => ({ id: p.id, score: scorePicks(p.picks, rr.results, quali).total })),
  );
}
```

This is clever and cheap: the first visitor after the race triggers grading for everyone, then `getLeaderboard` reads the now-scored rows. The page caches for ten minutes (`export const revalidate = 600`) so this work does not run on every single hit. There is also the **consensus** ("THE GRID THINKS"), which aggregates everyone's picks to show what percentage of fans chose each driver, computed server-side in `getConsensus` and rendered before lock.

The lock logic is a nice domain detail: picks lock at the start of **qualifying**, not the race, mirroring real F1 where the grid is decided in quali:

`apps/web/app/predict/page.tsx`
```ts
nextLockMs = new Date(
  next.sessions.find((s) => s.kind === 'Q')?.iso ?? next.raceStartIso,
).getTime();
nextIsLocked = nextLockMs < now;
```

### Interview ammo

**Q: Why did you choose Server-Sent Events over WebSockets for the live feed?**
The live data is one-directional, server pushing to client, so a full duplex WebSocket is overkill. SSE rides on plain HTTP, so it passes through every CDN and proxy without special config, and the browser's `EventSource` gives auto-reconnect with backoff for free. WebSockets would add operational complexity for a capability I never use.

**Q: How do you prevent the SSE endpoint from leaking resources or running up costs?**
The `while` loop is gated on an `alive` flag tied to the request's abort signal, so when the client disconnects the loop and its timers stop immediately. Outside a live session it only sends a 30-second heartbeat instead of polling expensive endpoints, and the tick rate is capped at one every two seconds. Each upstream fetch has a `.catch` fallback so one failure cannot crash the stream.

**Q: Walk me through how you draw a real track from GPS coordinates.**
I take one driver's x/y telemetry for a clean lap, find the bounding box, then compute a single scale factor as the smaller of the width-fit and height-fit ratios so the whole shape fits a 1000-unit SVG box without distortion. Each point is shifted to the origin, scaled, and centered; the y-axis is flipped with `SIZE - value` because SVG's y grows downward. The outline is just a downsampled polyline, a series of short straight segments that reads as a curve.

**Q: How do you stop your AI feature from hallucinating, and from costing too much?**
I ground the model by assembling a fact sheet from real career data plus a Wikipedia extract and instruct the system prompt to use only those facts and never invent specifics, with explicit rules for handling incomplete data. For cost, I wrap each call in `unstable_cache` keyed by driver with a 24-hour revalidate, so about 25 drivers means 25 calls a day total rather than one per page view. The call also returns null on any failure so the page never breaks.

**Q: What are SPF, DKIM, and DMARC, and why does email need them?**
SPF is a DNS list of servers allowed to send for your domain, DKIM is a cryptographic signature on each message verified against a public key in your DNS, and DMARC is the policy telling inboxes what to do when both fail. Because the mail protocol lets anyone claim any sender, inboxes use these to verify and trust you; without a verified domain your mail bounces or lands in spam, which is why the welcome email stays dormant until a verified sender is configured.

**Q: How does the prediction leaderboard work without user accounts, and what is the tradeoff?**
On first save I mint a random UUID and store it in an httpOnly, secure, sameSite cookie that becomes the player's identity, so predictions and leaderboard rows key off that ID with zero signup friction. Scoring is a pure function run lazily, the first page load after a race grades all unscored predictions in bulk. The tradeoff is that identity is per-browser, so clearing cookies or switching devices creates a new player, which is acceptable for a casual free game.

## 6. Infra, Deployment & DevOps

This is the section about how the code on your laptop becomes a website that strangers on the internet can open. None of this is about what the site looks like. It is about the pipes, the plumbing, the locks on the doors, and the alarm clocks that wake the server up to fetch fresh F1 news. By the end you should be able to say the word "shipping" without flinching.

### 6.1 What "deployment" even means

When you run the site on your own machine, you type a command, a little server boots up on `localhost:3000`, and only *you* can see it. The moment you close your laptop, the site is gone. **Deployment** is the act of taking that exact same code and putting it on a computer that is always on, always connected to the internet, and reachable by anyone with the URL.

> 🧠 Analogy: Running locally is cooking a meal in your own kitchen and eating it yourself. Deploying is opening a restaurant. Same recipe, but now the kitchen has to be open 24/7, handle many customers at once, and survive you going to sleep.

In this project, that always-on computer is rented from a company called **Vercel**. Your `DEPLOY.md` states the policy in one line:

```md
# /Users/shauryapunj/Desktop/F1_Shaurya/DEPLOY.md
Apex deploys to **Vercel only**. No Render, no Fly, no separate worker box.
```

The reason for "Vercel only" is that Vercel was built by the same people who make **Next.js** (the framework this app uses). So Next.js apps deploy to Vercel with almost zero configuration. The alternative was renting a raw Linux box (from DigitalOcean, AWS EC2, etc.) and configuring the web server, SSL certificates, process managers, and auto-restart by hand. That is a lot of sysadmin work for a one-person project, and every hour spent on it is an hour not spent on the actual F1 site. Vercel trades a little control for a lot of "it just works."

### 6.2 Serverless functions: the server that isn't always there

Here is the mind-bending part. There is no "server" sitting in a room running your code all day. Vercel uses **serverless functions**. When a request comes in (someone opens `/api/cron/jolpica-nightly`), Vercel spins up a tiny temporary computer, runs your function, sends back the answer, and then *throws the computer away*. If a thousand requests come in at once, it spins up a thousand tiny computers. If nobody visits for an hour, zero computers run and you pay nothing.

> 🧠 Analogy: A traditional server is a taxi driver you pay to sit outside your house all day in case you need a ride. Serverless is calling an Uber: a car appears only when you need it, and vanishes after the trip. You only pay per trip.

Every file under `apps/web/app/api/.../route.ts` becomes one of these on-demand functions. Look at the top of the nightly cron route:

```ts
// /Users/shauryapunj/Desktop/F1_Shaurya/apps/web/app/api/cron/jolpica-nightly/route.ts
export const runtime = 'nodejs';
export const dynamic = 'force-dynamic';
export const maxDuration = 60;

export async function GET(req: Request) {
```

Those three exported constants are instructions to Vercel about how to build the temporary computer:

- `runtime = 'nodejs'` says "run this on a full Node.js machine," not the lighter, more restricted "edge" runtime. This route talks to a database, so it needs the full Node environment.
- `dynamic = 'force-dynamic'` says "never pre-compute or cache this at build time, run it fresh every single call." A cron that fetches live standings must not be frozen into a static answer.
- `maxDuration = 60` says "let this function run up to 60 seconds before killing it." This is the **gotcha**: serverless functions have a hard time limit. On Vercel's free tier the ceiling is usually 60 seconds. If your function takes longer (a slow API, a huge database write), Vercel guillotines it mid-execution and the user gets an error. That is exactly why the route fetches three things *in parallel* (more on that in 6.5) instead of one after another, to stay inside the budget.

### 6.3 The monorepo deploy trap: Root Directory

This repo is a **monorepo**, meaning many projects live inside one Git repository. Your `pnpm-workspace.yaml` declares the layout:

```yaml
# /Users/shauryapunj/Desktop/F1_Shaurya/pnpm-workspace.yaml
packages:
  - "apps/*"
  - "packages/*"
```

So the deployable website is not at the repo root. It is at `apps/web`. There are also `apps/workers`, and a `packages/` folder full of shared libraries (`@apex/ui`, `@apex/db`, `@apex/api-client`).

> 🧠 Analogy: The repo is an apartment building. `apps/web` is the one apartment you actually want to show a visitor. If you point the visitor at the *building's front door* instead of the specific apartment, they wander the hallways confused and never find the living room.

That is precisely the bug that broke the first deploys. By default Vercel assumes your app lives at the repo root and tries to build *there*. At the root there is no Next.js app, just a `turbo`-orchestrated workspace, so the build fails or builds the wrong thing. The fix is a single setting, documented in `DEPLOY.md`:

```md
# /Users/shauryapunj/Desktop/F1_Shaurya/DEPLOY.md
In Vercel dashboard → Settings → Build & Development Settings:
- **Root Directory**: `apps/web`
- **Node.js Version**: `22.x`
```

**Root Directory = `apps/web`** tells Vercel "the apartment is on this floor, start here." Once that is set, Vercel finds the Next.js app, auto-detects the framework, and builds correctly. The build itself is run through **pnpm** (the package manager) and **Turbo** (the task runner declared in the root `package.json` scripts like `"build": "turbo run build"`), which knows how to compile the shared `packages/*` that `apps/web` depends on. That dependency on sibling packages is why `next.config.ts` has this line:

```ts
// /Users/shauryapunj/Desktop/F1_Shaurya/apps/web/next.config.ts
transpilePackages: ['@apex/ui', '@apex/types', '@apex/api-client', '@apex/db'],
```

`transpilePackages` tells Next "these imported packages are raw TypeScript from my own monorepo, not pre-compiled npm libraries, so compile them as part of my build." Forget this line and you get cryptic "unexpected token" errors because Next tries to run un-compiled TypeScript from a sibling package. That is the monorepo tax: you must explicitly tell the build tool which neighbors to bring along.

### 6.4 Environment variables and secrets: why `.env.local` is gitignored

Your code needs secret keys: a Groq AI key, a YouTube key, a Resend email key, a database password. These are like the keys to your house. You absolutely cannot paste them into your code and push them to GitHub, because the repo is public and anyone could read them, run up your API bills, or read your database.

The solution is **environment variables**: values that live *outside* the code, in the environment the code runs in. Locally they live in a file named `.env.local`, and the single most important rule is that this file is **gitignored**, never committed:

```
# /Users/shauryapunj/Desktop/F1_Shaurya/.gitignore
.env
.env.local
.env.*.local
# Stray secret drop file. NEVER commit. Move keys into .env.local.
*.env.local
```

> 🧠 Analogy: `.env.local` is the spare key under your doormat. `.gitignore` is the rule "never photograph the doormat and post it online." If you commit the file, you have published the location of every key to the world.

But teammates (and future-you) still need to know *which* keys exist. So the repo commits a safe twin, `.env.example`, that lists every key name with the *value blank*:

```bash
# /Users/shauryapunj/Desktop/F1_Shaurya/apps/web/.env.example
GROQ_API_KEY=
RESEND_API_KEY=
CRON_SECRET=
DATABASE_URL=
NEXT_PUBLIC_SITE_URL=
```

This is the standard pattern: commit the *shape* of the secrets, never the secrets themselves. In production, the real values are pasted into Vercel's dashboard (Settings → Environment Variables), and Vercel injects them into each serverless function at runtime. `DEPLOY.md` spells this out: "Paste every row from `apps/web/.env.example` into Vercel → Settings → Environment Variables."

One subtlety worth knowing for interviews: keys prefixed `NEXT_PUBLIC_` (like `NEXT_PUBLIC_SITE_URL`) are *deliberately* exposed to the browser. Next.js bakes those into the client-side JavaScript, so they must never hold a secret. Everything without that prefix stays server-only. Putting a real secret behind a `NEXT_PUBLIC_` name is a classic way to accidentally leak it.

The code reads these with `process.env`. You can see it in the cron auth gate and the admin middleware:

```ts
// /Users/shauryapunj/Desktop/F1_Shaurya/apps/web/lib/cron-auth.ts
const secret = process.env['CRON_SECRET'];
if (!secret) return false;
```

If the env var is missing, the code degrades gracefully (returns false, disables the feature) rather than crashing. That defensive style runs all through this codebase: missing key means "feature off," not "site down."

### 6.5 Cron jobs: alarm clocks for your server

A **cron job** is a task that runs automatically on a schedule, with no human and no visitor triggering it. The name comes from old Unix systems; the schedule is written in **cron syntax**, five fields meaning `minute hour day-of-month month day-of-week`.

> 🧠 Analogy: A cron job is an alarm clock for your server. `0 3 * * *` means "every day at 3:00 AM, wake up and do the thing." The five stars are the dials on the clock.

This project uses cron for one core purpose: keeping the news, standings, and weather *fresh* even when nobody is visiting. If the site only refreshed when a human loaded a page, the first visitor each morning would see stale data and a slow load. Cron pre-warms the caches overnight so the morning UK news cycle finds everything already fresh. The comment at the top of the nightly route says exactly this:

```ts
// /Users/shauryapunj/Desktop/F1_Shaurya/apps/web/app/api/cron/jolpica-nightly/route.ts
 * Fires daily at 03:00 UTC · pulls current season schedule + driver standings
 * + constructor standings to keep the cache primed before the morning UK news
 * cycle.
```

The schedules themselves are declared in `vercel.json`:

```json
// /Users/shauryapunj/Desktop/F1_Shaurya/apps/web/vercel.json
"crons": [
  { "path": "/api/cron/jolpica-nightly", "schedule": "0 3 * * *" },
  { "path": "/api/cron/youtube-sync", "schedule": "0 4 * * *" },
  { "path": "/api/cron/newsletter-blast", "schedule": "0 6 * * 5" }
]
```

Read them aloud: `0 3 * * *` is "every day at 03:00." `0 4 * * *` is "every day at 04:00." `0 6 * * 5` is "06:00 on day-of-week 5," which is Friday, that is the Race Week Briefing newsletter that goes out before a weekend's racing.

### 6.6 Why some crons live on GitHub Actions instead of Vercel

Here is the most interview-worthy decision in this whole section. Look closely at the `vercel.json` crons above: every schedule runs *at most once a day*. But the project clearly *wants* news refreshed every 5 minutes and weather every hour. Where did those go?

They moved to **GitHub Actions**. The reason is a hard platform limit, and the commit message that fixed it names it directly:

```
5788686 fix(deploy): trim vercel.json crons to daily for Hobby tier
        (sub-daily routes stay live, schedule externally)
```

**Vercel's free "Hobby" tier only allows crons that run once per day or less.** A `*/5 * * * *` (every 5 minutes) cron is rejected, and a rejected `vercel.json` can fail the whole deploy. So the high-frequency jobs were pulled out and re-homed in GitHub Actions, which on a *public* repo gives unlimited free minutes. The weather workflow's own comment lays out the logic:

```yaml
# /Users/shauryapunj/Desktop/F1_Shaurya/.github/workflows/refresh-weather.yml
# Repo-native hourly cron. ... (Vercel Hobby rejects sub-daily
# Vercel crons, so this lives in GitHub Actions — free/unlimited on a public repo).
```

> 🧠 Analogy: Vercel's free alarm clock can only ring once a day. You needed an alarm every 5 minutes. So you bought a second, free alarm clock from GitHub and pointed it at the same door.

And crucially, GitHub Actions does not *run* your app code. It just acts as the alarm clock that *pokes* the already-deployed Vercel route over HTTP. The news workflow is just a `curl` on a timer:

```yaml
# /Users/shauryapunj/Desktop/F1_Shaurya/.github/workflows/refresh-news.yml
on:
  schedule:
    - cron: '*/5 * * * *' # every 5 minutes
  workflow_dispatch: {} # manual "Run workflow" button
...
        run: |
          code=$(curl -sS -m 60 -o /tmp/out.json -w '%{http_code}' \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "https://apex-f1-five.vercel.app/api/cron/rss-sync") || true
          echo "rss-sync -> HTTP ${code}"
```

Two professional touches to notice. `workflow_dispatch: {}` adds a manual "Run workflow" button in the GitHub UI so you can fire it by hand for testing. And the weather cron deliberately runs at minute `17` (`17 * * * *`) instead of `0`, with the comment "offset 17min so it doesn't collide with the news ping." Staggering schedules so two jobs don't hammer your server at the same instant is a real ops habit.

The **gotcha** with GitHub Actions cron: it is best-effort, not exact. Under load GitHub can delay or coalesce scheduled runs, so your "every 5 minutes" might occasionally be every 8. The workflow comment acknowledges this is fine "for a news cache." If you needed second-precise timing (say, charging credit cards), GitHub cron would be the wrong tool.

### 6.7 How the cron proves it is allowed: the shared auth gate

Both worlds (the Vercel scheduler and the GitHub `curl`) hit the same public URL. So how does the route know the caller is legitimate and not a random person on the internet spamming `/api/cron/rss-sync` to run up your API bills? Two doors, both in one shared helper:

```ts
// /Users/shauryapunj/Desktop/F1_Shaurya/apps/web/lib/cron-auth.ts
export function isAuthorizedCronRequest(req: Request): boolean {
  if (req.headers.get('x-vercel-cron')) return true;
  const secret = process.env['CRON_SECRET'];
  if (!secret) return false;
  const auth = req.headers.get('authorization') ?? '';
  return auth === `Bearer ${secret}`;
}
```

Door one: when *Vercel's own scheduler* calls the route, it stamps a special header `x-vercel-cron: 1`. The file's comment explains why this can't be faked: "Vercel's edge strips this from inbound traffic, so it cannot be forged from a public client." A stranger can put that header in their request, but Vercel deletes it at the edge before your code ever sees it, so only the real internal scheduler gets through.

Door two: for off-platform callers (GitHub Actions, or you replaying from a terminal), there is no magic header, so they must present `Authorization: Bearer <CRON_SECRET>`. That secret is a 256-bit random string generated with `openssl rand -base64 32`, stored in Vercel env and in GitHub's encrypted secrets (`${{ secrets.CRON_SECRET }}` in the workflow). Same secret on both ends, never in the code.

The route refuses anyone who fails both checks:

```ts
// /Users/shauryapunj/Desktop/F1_Shaurya/apps/web/app/api/cron/jolpica-nightly/route.ts
if (!isAuthorizedCronRequest(req)) {
  return NextResponse.json({ ok: false, error: 'unauthorized' }, { status: 401 });
}
```

### 6.8 The cron template: what a well-built scheduled job looks like

The nightly route is the model every other cron in the repo copies. It is worth understanding as a *pattern*, not just code, because "design a reliable background job" is a common interview prompt. Four moves:

First, **fail in isolation, run in parallel**. Three upstream fetches go out at once with `Promise.allSettled`, which (unlike `Promise.all`) never short-circuits, one provider dying does not kill the other two:

```ts
// /Users/shauryapunj/Desktop/F1_Shaurya/apps/web/app/api/cron/jolpica-nightly/route.ts
const [scheduleRes, driverRes, teamRes] = await Promise.allSettled([
  timed(() => retry(() => jolpica.getSchedule('current', { revalidate: 60 })).then((rs) => rs.map(mapRace))),
  ...
]);
```

Second, **retry transient failures**. The `retry()` helper re-attempts with exponential backoff (250ms, then 500, then 1000) because free upstream APIs hiccup. Its comment: "Jolpica's free tier 429s under burst." A `429` is "too many requests," waiting and retrying usually fixes it.

Third, **bust the cache** so the work was worth it. After fetching, the route calls `revalidatePath('/')`, `revalidatePath('/schedule')`, etc., which tells Next "throw away the frozen version of these pages so the next visitor regenerates them with the fresh data."

Fourth, **emit a structured log and an honest status code**. Every cron returns the same JSON envelope via `buildReport` and logs one machine-parseable line via `logReport`. And the final status is nuanced:

```ts
// /Users/shauryapunj/Desktop/F1_Shaurya/apps/web/app/api/cron/jolpica-nightly/route.ts
return NextResponse.json(report, { status: ok ? 200 : 207 });
```

`200` means everything worked; `207` ("Multi-Status") means "partial success, some sub-tasks failed." That honesty matters because the GitHub workflow treats anything that is not `200` as a failure (`if [ "${code}" != "200" ]; then exit 1`), turning the GitHub Actions run red so you actually notice.

### 6.9 CI/CD: the automatic conveyor belt

**CI/CD** stands for Continuous Integration / Continuous Deployment. In plain English: the moment you push code to GitHub, machines automatically check it and ship it, with no human clicking "deploy."

> 🧠 Analogy: Old-school deploying is hand-carrying a box to the post office every time. CI/CD is a conveyor belt: you drop the box on the belt (push to `main`) and it gets inspected and delivered on its own.

`DEPLOY.md` describes the belt: "GitHub is the source of truth. Every push to `main` triggers a Vercel deploy." Vercel watches the GitHub repo, and on every push it pulls the new code, runs the build, and if the build passes, swaps the live site to the new version atomically. If the build fails, the old version stays up, so a broken commit never takes the site down. This project has *two* CI systems running side by side: **Vercel** handles build-and-deploy (the CD half), and **GitHub Actions** handles the scheduled `curl` pings from section 6.6. They are separate tools doing separate jobs.

### 6.10 Middleware and HTTP Basic auth: the bouncer at `/admin`

Some pages should not be public. The admin console (where articles get written) must be locked. **Middleware** is code that runs *before* a request reaches your actual pages, like a bouncer at the door who checks IDs before anyone enters the club.

In Next.js, middleware lives in one file, `apps/web/middleware.ts`, and a `config.matcher` at the bottom decides *which* doors the bouncer guards:

```ts
// /Users/shauryapunj/Desktop/F1_Shaurya/apps/web/middleware.ts
export const config = {
  matcher: ['/admin', '/admin/:path*', '/api/articles', '/api/articles/:path*'],
};
```

So only `/admin` and the article write API are gated; the rest of the site is open. The gate itself uses **HTTP Basic auth**, the oldest, simplest password scheme on the web, where the browser pops up a native username/password box:

```ts
// /Users/shauryapunj/Desktop/F1_Shaurya/apps/web/middleware.ts
const auth = req.headers.get('authorization');
const expected = 'Basic ' + btoa(`apex:${pw}`);
if (auth !== expected) {
  return new NextResponse('Authentication required', {
    status: 401,
    headers: { 'WWW-Authenticate': 'Basic realm="Apex Admin", charset="UTF-8"' },
  });
}
```

The flow: the browser sends an `Authorization` header containing the username `apex` and password joined and base64-encoded (`btoa`). The middleware builds the *expected* header from the `ADMIN_PASSWORD` env var and compares. No match means `401` with a `WWW-Authenticate` header, which is the signal that makes the browser show its login popup.

There is a clever safety default for the case where nobody has set a password yet:

```ts
// /Users/shauryapunj/Desktop/F1_Shaurya/apps/web/middleware.ts
if (!pw) {
  if (process.env.VERCEL_ENV === 'production') {
    return new NextResponse('Not Found', { status: 404 });
  }
  return NextResponse.next();
}
```

If `ADMIN_PASSWORD` is unset: in **production** the admin page returns a flat `404` (so an unguarded console is never reachable on the live internet), but in **local dev** it lets you straight through (so you can work without fuss). This is "secure by default, convenient in dev," a great pattern.

Two honest caveats the code's own comment admits. Base64 is *encoding, not encryption*, anyone who intercepts the header can decode the password, so Basic auth is only safe over HTTPS (which Vercel provides for free). And the comment notes this is a stopgap: "Replace with Supabase Auth role gating when multi-user editing lands." Basic auth is one shared password; it does not scale to multiple users with different permissions. It is the right tool for "lock the door for now, properly furnish the room later."

Worth noting the security headers in `next.config.ts` that harden every response (`X-Frame-Options: DENY` stops your site being embedded in a clickjacking iframe; `X-Content-Type-Options: nosniff` stops browsers guessing file types), plus the `noindex` header in `vercel.json` that tells Google not to list any `/api/*` URL in search results.

### 6.11 DNS, practically: how a name becomes a server, and the Resend fix

**DNS** (Domain Name System) is the internet's phone book. Humans type names like `apex-f1.vercel.app`; computers only talk in IP addresses like `76.76.21.21`. DNS is the lookup that turns the name into the number.

> 🧠 Analogy: DNS is the contacts app on your phone. You tap "Mom," and the phone dials the actual number. You never memorize the number; the contact list does it for you.

A few record types you must know:

- **Nameservers** are the authority that *holds* your domain's phone book. When you buy a domain, you point its nameservers at whoever manages your records (here, Vercel). Whoever controls the nameservers controls the domain.
- An **A record** maps a name to an IPv4 address ("`apex-f1` lives at `76.76.21.21`"). This is what makes the website itself reachable.
- A **TXT record** holds arbitrary text, used mostly to *prove ownership* and to authorize email. It is a note pinned to the domain that other services can read.
- An **MX record** ("Mail eXchange") says which server handles email *for* this domain.

DNS mattered in this project specifically for **email**. The newsletter uses **Resend** to send the Race Week Briefing. By default the cron can send from Resend's shared `onboarding@resend.dev`, which works with no setup but looks unprofessional. To send from your own `something@apex.gg` address, Resend has to *verify you actually own that domain*, and verification is done entirely through DNS records. The `.env.example` comment captures the dormant state:

```bash
# /Users/shauryapunj/Desktop/F1_Shaurya/apps/web/.env.example
# Set RESEND_FROM_EMAIL to
# something@apex.gg once the apex domain is verified in Resend.
```

How verification works, concretely. Resend gives you a set of records to add: a **TXT** record proving you control the domain, **DKIM** records (also TXT, holding a public cryptographic key so receiving mail servers can confirm the email genuinely came from you and was not forged), and often an **MX/SPF** entry declaring which servers may send mail as your domain. Because Vercel manages this domain's nameservers, the records were added programmatically through the **Vercel DNS API** rather than clicking around a dashboard. You send Vercel an API call saying "add a TXT record named `resend._domainkey` with this value," Vercel writes it into the phone book, Resend re-checks, sees its records present, and flips the domain to "verified." Once verified, the cron can finally send as a branded address.

The **gotcha** that bites everyone: DNS changes are not instant. Records have a **TTL** (time-to-live) and can take minutes to hours to **propagate** across the world's DNS caches. If you add the Resend records and verification fails immediately, the usual cause is not a wrong record, it is that you checked too soon. The fix is patience, or lowering the TTL. The second classic mistake is a typo in the record name or value; a single wrong character in a DKIM key means email silently fails SPF/DKIM checks and lands in spam, with no loud error to tell you why.

### Interview ammo

**Q: What is a serverless function and what is its biggest constraint?**
A serverless function is code that runs on-demand: the platform spins up a temporary machine per request and discards it after, so you pay per execution and scale automatically. The biggest constraint is the execution time limit, which is why this repo sets `maxDuration = 60` and fetches upstreams in parallel with `Promise.allSettled` to stay inside the budget.

**Q: Why are some cron jobs in `vercel.json` and others in GitHub Actions?**
Vercel's free Hobby tier only permits crons that run once a day or less, so daily jobs like `jolpica-nightly` live in `vercel.json`, while sub-daily jobs (news every 5 min, weather hourly) were moved to GitHub Actions, which is free and unlimited on a public repo. The GitHub jobs don't run app code; they just `curl` the already-deployed Vercel route on a schedule.

**Q: How does a public cron route reject unauthorized callers?**
Two gates in `isAuthorizedCronRequest`: Vercel's own scheduler is trusted via the `x-vercel-cron` header, which Vercel strips from inbound public traffic so it can't be forged; off-platform callers must present `Authorization: Bearer $CRON_SECRET`, a 256-bit secret stored in env and GitHub secrets. Fail both and the route returns 401.

**Q: Why is `.env.local` gitignored, and what gets committed instead?**
`.env.local` holds real secrets (API keys, the database URL), and the repo is public, so committing it would leak every credential to the world. Instead the repo commits `.env.example`, which lists every key name with blank values, documenting the shape of the config without exposing any secret; production values are pasted into Vercel's dashboard.

**Q: What broke deploys in this monorepo and how was it fixed?**
Vercel defaults to building from the repo root, but the deployable Next.js app lives at `apps/web`, so the build looked in the wrong place. Setting Root Directory to `apps/web` fixed it, and `transpilePackages` in `next.config.ts` ensures the shared `@apex/*` workspace packages get compiled as part of the build.

**Q: How does the `/admin` page stay private, and what are the limits of that approach?**
`middleware.ts` runs before the page, matches `/admin` and `/api/articles` via `config.matcher`, and enforces HTTP Basic auth by comparing the request's `Authorization` header against one built from `ADMIN_PASSWORD`; if the password env is unset it returns 404 in production. The limits: Basic auth is base64-encoded (not encrypted, safe only over HTTPS) and is a single shared password, so it's a stopgap until proper multi-user role-based auth replaces it.

**Q: At a practical level, how did you get Resend to send from your own domain?**
Resend requires domain ownership proof via DNS, so I added TXT records (ownership plus DKIM public keys) and SPF/MX entries through the Vercel DNS API since Vercel manages the nameservers. After the records propagated, Resend re-checked, saw them present, and verified the domain, which let the newsletter cron send from a branded address instead of the default `onboarding@resend.dev`.
